<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W3Dota Wiki — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090f;
  --surface: #111019;
  --surface2: #18162a;
  --border: rgba(110,75,140,0.28);
  --border-gold: rgba(201,168,76,0.4);
  --gold: #c9a84c;
  --gold-glow: rgba(201,168,76,0.12);
  --text: #cbbddb;
  --text-dim: #7a6a8a;
  --text-bright: #e8daf8;
  --q: #3dd5dc; --w: #5b8ee6; --e: #4cc87a; --r: #c9a84c; --s: #52506a;
  --changed-bg: rgba(201,168,76,0.07);
  --changed-border: rgba(201,168,76,0.32);
  --success: #4cc87a; --error: #e06060;
  --radius: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

/* ── GATE ── */
#gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.gate-card {
  background: var(--surface); border: 1px solid var(--border-gold); border-radius: 12px;
  padding: 48px 40px; width: 100%; max-width: 380px; text-align: center;
  box-shadow: 0 0 60px rgba(201,168,76,0.08);
}
.gate-icon { font-size: 2.4rem; margin-bottom: 16px; }
.gate-card h1 { font-family: 'Cinzel', serif; font-size: 1.25rem; color: var(--gold); margin-bottom: 6px; letter-spacing: .05em; }
.gate-card p { color: var(--text-dim); font-size: .85rem; margin-bottom: 28px; }
.gate-card input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text-bright); font-family: 'Inter', sans-serif;
  font-size: .9rem; padding: 10px 14px; outline: none; margin-bottom: 12px; transition: border-color .15s;
}
.gate-card input:focus { border-color: var(--gold); }
.gate-card button {
  width: 100%; background: linear-gradient(135deg,#4a3510,#8a6a28,#c9a84c,#8a6a28,#4a3510);
  border: none; border-radius: var(--radius); color: #0a0a12; font-family: 'Cinzel', serif;
  font-size: .9rem; font-weight: 700; letter-spacing: .06em; padding: 11px; cursor: pointer; transition: opacity .15s;
}
.gate-card button:hover { opacity: .85; }
.err-msg { color: var(--error); font-size: .8rem; margin-top: 10px; min-height: 18px; }

/* ── APP SHELL ── */
#app { display: none; }
.app-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 32px; display: flex; align-items: center; gap: 16px; height: 54px;
}
.app-header h1 { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold); letter-spacing: .06em; flex: 1; }
.logout-btn {
  background: none; border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-dim); cursor: pointer; font-size: .78rem; padding: 5px 12px;
  transition: border-color .15s, color .15s;
}
.logout-btn:hover { border-color: var(--gold); color: var(--gold); }
.app-body { max-width: 900px; margin: 0 auto; padding: 32px 24px 60px; }
.section-heading {
  font-family: 'Cinzel', serif; font-size: .7rem; color: var(--text-dim);
  letter-spacing: .12em; text-transform: uppercase; margin-bottom: 14px;
}

/* ── CUSTOM HERO PICKER ── */
.hero-selector-row { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; }
.hero-selector-row > label { color: var(--text-dim); font-size: .82rem; white-space: nowrap; }
.hero-picker { position: relative; flex: 1; }
.picker-trigger {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 12px; cursor: pointer;
  user-select: none; transition: border-color .15s;
}
.picker-trigger:hover, .picker-trigger.open { border-color: var(--gold); }
#picker-portrait-img { width: 40px; height: 34px; object-fit: cover; border-radius: 4px; flex-shrink: 0; display: none; border: 1px solid var(--border); }
.picker-label { flex: 1; color: var(--text-bright); font-size: .9rem; }
.picker-arrow { color: var(--text-dim); font-size: .75rem; transition: transform .2s; }
.picker-trigger.open .picker-arrow { transform: rotate(180deg); }
.picker-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 200;
  background: var(--surface); border: 1px solid var(--border-gold);
  border-radius: 8px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,.7); display: none;
}
.picker-dropdown.open { display: block; }
.picker-search {
  width: 100%; background: var(--surface2); border: none; border-bottom: 1px solid var(--border);
  color: var(--text-bright); font-size: .85rem; padding: 10px 14px; outline: none;
  font-family: 'Inter', sans-serif;
}
.picker-list { max-height: 260px; overflow-y: auto; }
.picker-list::-webkit-scrollbar { width: 4px; }
.picker-list::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 4px; }
.picker-item {
  display: flex; align-items: center; gap: 10px; padding: 7px 14px;
  cursor: pointer; transition: background .1s;
}
.picker-item:hover, .picker-item.is-active { background: var(--gold-glow); }
.picker-item img { width: 40px; height: 34px; object-fit: cover; border-radius: 4px; flex-shrink: 0; border: 1px solid var(--border); }
.picker-item-name { color: var(--text); font-size: .85rem; }

/* ── HERO BANNER ── */
.hero-banner {
  display: none; align-items: center; gap: 22px;
  background: linear-gradient(120deg, var(--surface) 0%, #1c1430 100%);
  border: 1px solid var(--border-gold); border-radius: 10px;
  padding: 18px 22px; margin-bottom: 24px;
  box-shadow: 0 0 40px rgba(201,168,76,.06);
}
.banner-portrait {
  width: 108px; height: 93px; object-fit: cover; border-radius: 7px;
  border: 2px solid var(--border-gold); flex-shrink: 0; box-shadow: 0 4px 20px rgba(0,0,0,.5);
}
.banner-info { flex: 1; min-width: 0; }
.banner-hero-name {
  font-family: 'Cinzel', serif; font-size: 1.45rem; color: var(--gold);
  letter-spacing: .04em; margin-bottom: 12px;
}
.banner-abilities { display: flex; gap: 8px; flex-wrap: wrap; }
.banner-ability {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 5px; padding: 5px 10px;
}
.banner-ability img { width: 24px; height: 24px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
.banner-ability-key { font-size: .6rem; font-weight: 700; letter-spacing: .05em; }
.key-q { color: var(--q); } .key-w { color: var(--w); } .key-e { color: var(--e); } .key-r { color: var(--r); }
.banner-ability-name { font-size: .72rem; color: var(--text); max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── CARD ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
.card-header { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; }
.card-title { font-family: 'Cinzel', serif; font-size: .72rem; color: var(--gold); letter-spacing: .1em; }
.card-label-badge {
  background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.25);
  border-radius: 4px; color: var(--gold); font-size: .68rem; font-weight: 600;
  letter-spacing: .06em; padding: 2px 8px;
}
.card-body { padding: 14px 16px; }

/* ── SKILL STRIP ── */
.skill-strip { display: flex; gap: 4px; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; }
.skill-strip::-webkit-scrollbar { height: 4px; }
.skill-strip::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 4px; }
.strip-cell { display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; }
.strip-badge {
  width: 32px; height: 32px; border-radius: 5px; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 700;
}
.strip-badge img { width: 100%; height: 100%; object-fit: cover; display: block; }
.strip-lvl { font-size: .6rem; color: var(--text-dim); }
.badge-q { background: rgba(61,213,220,.15); border: 1px solid rgba(61,213,220,.4); color: var(--q); }
.badge-w { background: rgba(91,142,230,.15); border: 1px solid rgba(91,142,230,.4); color: var(--w); }
.badge-e { background: rgba(76,200,122,.15); border: 1px solid rgba(76,200,122,.4); color: var(--e); }
.badge-r { background: rgba(201,168,76,.18); border: 1px solid rgba(201,168,76,.5); color: var(--r); }
.badge-s { background: rgba(82,80,106,.2); border: 1px solid rgba(82,80,106,.4); color: var(--s); }

/* ── BUILD TABS ── */
.build-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.build-tab {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-dim); cursor: pointer; font-family: 'Inter', sans-serif;
  font-size: .8rem; font-weight: 500; padding: 6px 14px; transition: all .15s;
}
.build-tab:hover { border-color: var(--gold); color: var(--text); }
.build-tab.active { background: var(--gold-glow); border-color: var(--gold); color: var(--gold); font-weight: 600; }
.add-build-btn {
  background: none; border: 1px dashed var(--border); border-radius: var(--radius);
  color: var(--text-dim); cursor: pointer; font-size: .8rem; padding: 6px 14px; transition: all .15s;
}
.add-build-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ── EDITOR GRID ── */
.editor-grid { display: flex; flex-direction: column; gap: 2px; }
.editor-row {
  display: grid;
  grid-template-columns: 32px 40px 14px 1fr 110px;
  align-items: center; gap: 8px; padding: 4px 8px; border-radius: 5px; transition: background .1s;
}
.editor-row.is-changed { background: var(--changed-bg); outline: 1px solid var(--changed-border); }
.editor-row:not(.is-changed):hover { background: rgba(255,255,255,.025); }
.row-lvl { color: var(--text-dim); font-size: .72rem; font-weight: 600; text-align: center; }
.row-current { display: flex; justify-content: center; }
.row-arrow { color: var(--text-dim); font-size: .75rem; text-align: center; }
.row-options { display: flex; gap: 3px; }
.opt-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text-dim); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  font-size: .6rem; font-weight: 700; height: 42px; flex: 1;
  padding: 3px 2px; transition: all .12s; min-width: 0;
}
.opt-btn img { width: 20px; height: 20px; border-radius: 3px; object-fit: cover; flex-shrink: 0; }
.opt-btn:hover { border-color: rgba(201,168,76,.4); color: var(--text); }
.opt-btn.sel-q { background: rgba(61,213,220,.12); border-color: rgba(61,213,220,.5); color: var(--q); }
.opt-btn.sel-w { background: rgba(91,142,230,.12); border-color: rgba(91,142,230,.5); color: var(--w); }
.opt-btn.sel-e { background: rgba(76,200,122,.12); border-color: rgba(76,200,122,.5); color: var(--e); }
.opt-btn.sel-r { background: rgba(201,168,76,.15); border-color: rgba(201,168,76,.55); color: var(--r); }
.opt-btn.sel-s { background: rgba(82,80,106,.18); border-color: rgba(82,80,106,.5); color: var(--s); }
.row-changed-tag { font-size: .65rem; color: var(--gold); font-weight: 600; text-align: right; line-height: 1.4; }
.diff-from { text-decoration: line-through; opacity: .5; }

/* ── DIFF SUMMARY ── */
.diff-summary { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); margin-top: 16px; padding: 12px 16px; }
.diff-title { font-size: .75rem; font-weight: 600; color: var(--gold); margin-bottom: 8px; }
.diff-list { display: flex; flex-direction: column; gap: 5px; }
.diff-item { font-size: .78rem; color: var(--text-dim); }
.diff-item strong { color: var(--text); }
.diff-to { color: var(--gold); font-weight: 600; }
.no-changes { font-size: .78rem; color: var(--text-dim); font-style: italic; }

/* ── LABEL EDITOR ── */
.label-row { display: flex; align-items: center; gap: 8px; margin: 0; flex: 1; margin-left: 10px; }
.label-row label { font-size: .78rem; color: var(--text-dim); white-space: nowrap; }
.label-input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-bright); font-size: .82rem; padding: 6px 10px; outline: none;
  width: 160px; transition: border-color .15s;
}
.label-input:focus { border-color: var(--gold); }
.remove-build-btn {
  background: none; border: 1px solid rgba(224,96,96,.3); border-radius: var(--radius);
  color: var(--error); cursor: pointer; font-size: .75rem; margin-left: auto;
  padding: 5px 10px; opacity: .7; transition: all .15s;
}
.remove-build-btn:hover { opacity: 1; border-color: var(--error); }

/* ── SAVE AREA ── */
.save-area { margin-top: 28px; display: flex; align-items: center; gap: 14px; }
.save-btn {
  background: linear-gradient(135deg,#4a3510,#8a6a28,#c9a84c,#8a6a28,#4a3510);
  border: none; border-radius: var(--radius); color: #0a0a12; cursor: pointer;
  font-family: 'Cinzel', serif; font-size: .82rem; font-weight: 700;
  letter-spacing: .06em; padding: 11px 28px; transition: opacity .15s;
}
.save-btn:disabled { opacity: .35; cursor: not-allowed; }
.save-btn:not(:disabled):hover { opacity: .85; }
.save-status { font-size: .82rem; }
.save-status.ok { color: var(--success); }
.save-status.err { color: var(--error); }
.save-status.loading { color: var(--text-dim); }

/* ── MISC ── */
.placeholder { text-align: center; padding: 48px 20px; color: var(--text-dim); font-size: .85rem; }
.placeholder span { display: block; font-size: 2rem; margin-bottom: 12px; opacity: .4; }
.loading-banner { text-align: center; padding: 28px; color: var(--text-dim); font-size: .82rem; }

/* ── BACK BUTTON ── */
.back-btn {
  background: none; border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-dim); text-decoration: none; font-size: .78rem; padding: 5px 12px;
  transition: border-color .15s, color .15s; white-space: nowrap;
}
.back-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ── SPELL EDITOR ── */
.section-divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
.spell-abilities-grid { display: flex; flex-direction: column; gap: 12px; }
.spell-ability-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.spell-ability-header {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border-bottom: 1px solid var(--border); padding: 9px 14px;
}
.spell-ability-icon { width: 28px; height: 28px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
.spell-ability-name { font-family: 'Cinzel', serif; font-size: .73rem; color: var(--gold); letter-spacing: .06em; }
.spell-stat-rows { padding: 8px 14px; display: flex; flex-direction: column; gap: 5px; }
.spell-stat-row {
  display: grid; grid-template-columns: 110px 1fr 60px;
  align-items: center; gap: 10px; padding: 5px 6px; border-radius: 5px; transition: background .1s;
}
.spell-stat-row.is-changed { background: var(--changed-bg); outline: 1px solid var(--changed-border); }
.spell-stat-row:not(.is-changed):hover { background: rgba(255,255,255,.025); }
.spell-stat-label { font-size: .8rem; color: var(--text-dim); font-weight: 500; }
.spell-stat-input-wrap { display: flex; flex-direction: column; gap: 2px; }
.spell-stat-input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-bright); font-size: .82rem; font-family: 'Inter', sans-serif;
  padding: 5px 9px; outline: none; width: 100%; transition: border-color .15s;
}
.spell-stat-input:focus { border-color: var(--gold); }
.spell-stat-row.is-changed .spell-stat-input { border-color: var(--changed-border); }
.spell-stat-base { font-size: .62rem; color: var(--text-dim); }
.spell-changed-tag { font-size: .65rem; color: var(--gold); font-weight: 600; text-align: right; }
</style>
</head>
<body>

<!-- ── GATE ── -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-icon">⚔</div>
    <h1>W3Dota Wiki Admin</h1>
    <p>Enter the admin password to continue</p>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password">
    <button id="pw-btn">Enter</button>
    <div class="err-msg" id="pw-err"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <header class="app-header">
    <h1>⚔ W3Dota Wiki — Admin Panel</h1>
    <a href="/" class="back-btn">← Wiki</a>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </header>
  <div class="app-body">
    <p class="section-heading">Skill Builds</p>

    <div class="hero-selector-row">
      <label>Hero</label>
      <div class="hero-picker" id="hero-picker">
        <div class="picker-trigger" id="picker-trigger" onclick="togglePicker()">
          <img id="picker-portrait-img" src="" alt="">
          <span class="picker-label" id="picker-label">— select a hero —</span>
          <span class="picker-arrow">▾</span>
        </div>
        <div class="picker-dropdown" id="picker-dropdown">
          <input class="picker-search" id="picker-search" placeholder="Search heroes…" autocomplete="off" oninput="filterPicker(this.value)">
          <div class="picker-list" id="picker-list"></div>
        </div>
      </div>
    </div>

    <div id="hero-banner" class="hero-banner"></div>

    <div id="editor-area">
      <div class="placeholder"><span>⚔</span>Select a hero above to start editing</div>
    </div>

    <div class="save-area" id="save-area" style="display:none">
      <button class="save-btn" id="save-btn" disabled onclick="saveChanges()">Save Changes</button>
      <span class="save-status" id="save-status"></span>
    </div>

    <!-- ── SPELL VALUES SECTION ── -->
    <div id="spell-section" style="display:none">
      <hr class="section-divider">
      <p class="section-heading">Spell Values</p>
      <div id="spell-editor-area">
        <div class="placeholder"><span>✨</span>Select a hero to edit spell values</div>
      </div>
      <div class="save-area" id="spell-save-area" style="display:none">
        <button class="save-btn" id="spell-save-btn" disabled onclick="saveSpellChanges()">Save Spell Values</button>
        <span class="save-status" id="spell-save-status"></span>
      </div>
    </div>
  </div>
</div>

<script>

}

  "Obsidian Destroyer":"obsidian_destroyer","Bane":"bane","Disruptor":"disruptor",
  "Jakiro":"jakiro","Rubick":"rubick","Visage":"visage","Ogre Magi":"ogre_magi",
  "Skywrath Mage":"skywrath_mage","Oracle":"oracle","Winter Wyvern":"winter_wyvern",
  "Batrider":"batrider","Tinker":"tinker","Puck":"puck","Leshrac":"leshrac",
  "Nature's Prophet":"furion","Storm Spirit":"storm_spirit","Shadow Demon":"shadow_demon",
  "Queen of Pain":"queenofpain","Sniper":"sniper","Venomancer":"venomancer",
  "Nyx Assassin":"nyx_assassin","Razor":"razor","Shadow Fiend":"nevermore",
  "Lone Druid":"lone_druid","Techies":"techies","Enchantress":"enchantress",
  "Chen":"chen","Slardar":"slardar","Pit Lord":"abyssal_underlord",
  "Legion Commander":"legion_commander","Bloodseeker":"bloodseeker",
};
function getSpellIconAdmin(heroName, spellName) {
  if (!spellName) return null;
  const btn = SPELL_ICONS[spellName];
  if (btn) return btn.includes('.') ? `${ICON_BASE}${btn}` : `${ICON_BASE}${btn}.jpg`;
  if (WOW_ICONS[spellName]) return WOW_BASE + WOW_ICONS[spellName] + '.jpg';
  if (DOTA2_ICONS[spellName]) return DOTA2_BASE + DOTA2_ICONS[spellName] + '.png';
  const key = HERO_KEYS[heroName]; if (!key) return null;
  const norm = spellName.toLowerCase().replace(/['']/g,'').replace(/[^a-z0-9]+/g,'_').replace(/_$/,'');
  return `${DOTA2_BASE}${key}_${norm}.png`;
}

// ── Ability name loader (lazy fetch + cache) ───────────────
let indexSource = null;
const abilityCache = {};
async function loadAbilities(heroName) {
  if (abilityCache[heroName]) return abilityCache[heroName];
  if (!indexSource) indexSource = await fetch('/index.html').then(r => r.text());
  const escaped = heroName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const m = indexSource.match(new RegExp(`name:"${escaped}"[\\s\\S]{0,300}?abilities:\\[([\\s\\S]{0,2500}?)\\],patches:`));
  const names = m ? [...m[1].matchAll(/name:"([^"]+)"/g)].map(x=>x[1]).slice(0,4) : [];
  while (names.length < 4) names.push(null);
  return (abilityCache[heroName] = names);
}

// ── State ──────────────────────────────────────────────────
let SKILL_BUILDS = {};
let selectedHero = null;
let originalBuilds = [];
let editBuilds = [];
let activeBuildIdx = 0;
let currentAbilityNames = [null,null,null,null];
let currentAbilityIcons = [null,null,null,null];
let allHeroes = [];
let pickerOpen = false;

// ── Spell editor state ─────────────────────────────────────
let spellAbilities    = [];  // [{ name, stats: [{type,label,value}] }]
let spellCurrentValues = {}; // abilityName → label → live value
let spellEditValues    = {}; // abilityName → label → edited value
let spellOverridesData = {};
let spellStatsCache    = {};

const IDX_NAMES = {0:'Q',1:'W',2:'E',3:'R',[-1]:'S'};
const BADGE_CLS = {'Q':'badge-q','W':'badge-w','E':'badge-e','R':'badge-r','S':'badge-s'};
const OPT_CLS   = {'Q':'sel-q','W':'sel-w','E':'sel-e','R':'sel-r','S':'sel-s'};
const KEY_LABELS = ['Q','W','E','R'];
const KEY_COLORS = ['key-q','key-w','key-e','key-r'];

// ── Auth ───────────────────────────────────────────────────
(async () => {
  const res = await fetch('/api/check-auth');
  res.ok ? enterApp() : showGate();
})();

function showGate() {
  document.getElementById('gate').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}
async function enterApp() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await Promise.all([loadSkillBuilds(), loadSpellOverrides()]);
  initPicker();
}

document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('pw-btn').click(); });
document.getElementById('pw-btn').addEventListener('click', async () => {
  const val = document.getElementById('pw-input').value.trim();
  if (!val) { document.getElementById('pw-err').textContent = 'Enter a password'; return; }
  document.getElementById('pw-btn').textContent = 'Checking…';
  document.getElementById('pw-btn').disabled = true;
  document.getElementById('pw-err').textContent = '';
  try {
    const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:val}) });
    if (res.ok) { document.getElementById('pw-input').value=''; enterApp(); }
    else {
      const d = await res.json().catch(()=>({}));
      document.getElementById('pw-err').textContent = d.error || 'Login failed';
      document.getElementById('pw-btn').textContent = 'Enter';
      document.getElementById('pw-btn').disabled = false;
    }
  } catch {
    document.getElementById('pw-err').textContent = 'Network error — try again';
    document.getElementById('pw-btn').textContent = 'Enter';
    document.getElementById('pw-btn').disabled = false;
  }
});

async function logout() {
  await fetch('/api/logout', {method:'POST'});
  selectedHero = null; currentAbilityNames = [null,null,null,null]; currentAbilityIcons = [null,null,null,null];
  spellAbilities = []; spellCurrentValues = {}; spellEditValues = {};
  document.getElementById('picker-portrait-img').style.display = 'none';
  document.getElementById('picker-label').textContent = '— select a hero —';
  document.getElementById('hero-banner').style.display = 'none';
  document.getElementById('editor-area').innerHTML = '<div class="placeholder"><span>⚔</span>Select a hero above to start editing</div>';
  document.getElementById('save-area').style.display = 'none';
  document.getElementById('spell-section').style.display = 'none';
  document.getElementById('pw-btn').textContent = 'Enter';
  document.getElementById('pw-btn').disabled = false;
  document.getElementById('pw-err').textContent = '';
  showGate();
}

// ── Data ───────────────────────────────────────────────────
async function loadSkillBuilds() {
  const res = await fetch('/skill_builds.js?t=' + Date.now());
  const text = await res.text();
  SKILL_BUILDS = new Function(text + '\nreturn SKILL_BUILDS;')();
}

// ── Custom Picker ──────────────────────────────────────────
function initPicker() {
  allHeroes = Object.keys(SKILL_BUILDS).sort();
  renderPickerItems(allHeroes);
}

function renderPickerItems(heroes) {
  document.getElementById('picker-list').innerHTML = heroes.map(h => {
    const p = getPortrait(h);
    return `<div class="picker-item" onclick="pickerSelect('${esc(h)}')" data-name="${esc(h)}">
      ${p ? `<img src="${esc(p)}" alt="" onerror="this.style.display='none'">` : '<div style="width:40px;height:34px;background:var(--surface2);border-radius:4px;border:1px solid var(--border);flex-shrink:0"></div>'}
      <span class="picker-item-name">${esc(h)}</span>
    </div>`;
  }).join('');
}

function filterPicker(q) {
  const lq = q.toLowerCase();
  renderPickerItems(lq ? allHeroes.filter(h => h.toLowerCase().includes(lq)) : allHeroes);
}

function togglePicker() {
  pickerOpen = !pickerOpen;
  document.getElementById('picker-trigger').classList.toggle('open', pickerOpen);
  document.getElementById('picker-dropdown').classList.toggle('open', pickerOpen);
  if (pickerOpen) { document.getElementById('picker-search').value=''; document.getElementById('picker-search').focus(); renderPickerItems(allHeroes); }
}

function pickerSelect(name) {
  pickerOpen = false;
  document.getElementById('picker-trigger').classList.remove('open');
  document.getElementById('picker-dropdown').classList.remove('open');
  const p = getPortrait(name);
  const img = document.getElementById('picker-portrait-img');
  if (p) { img.src = p; img.style.display = 'block'; } else { img.style.display = 'none'; }
  document.getElementById('picker-label').textContent = name;
  selectHero(name);
}

document.addEventListener('click', e => {
  if (!e.target.closest('#hero-picker') && pickerOpen) {
    pickerOpen = false;
    document.getElementById('picker-trigger').classList.remove('open');
    document.getElementById('picker-dropdown').classList.remove('open');
  }
});

// ── Hero select ────────────────────────────────────────────
async function selectHero(name) {
  selectedHero = name || null;
  document.getElementById('save-area').style.display = name ? 'flex' : 'none';
  if (!name) { document.getElementById('hero-banner').style.display='none'; return; }

  // Show loading state
  document.getElementById('hero-banner').style.display = 'flex';
  document.getElementById('hero-banner').innerHTML = '<div class="loading-banner">Loading ability data…</div>';
  document.getElementById('editor-area').innerHTML = '';

  // Load abilities + icons
  const names = await loadAbilities(name);
  currentAbilityNames = names;
  currentAbilityIcons = names.map(n => n ? getSpellIconAdmin(name, n) : null);

  // Banner
  showBanner(name);

  // Build state
  const raw = SKILL_BUILDS[name];
  originalBuilds = (Array.isArray(raw) && raw.length > 0 && typeof raw[0]==='object')
    ? raw.map(b => ({label:b.label, build:[...b.build]}))
    : [{label:null, build:[...raw]}];
  editBuilds = originalBuilds.map(b => ({label:b.label, build:[...b.build]}));
  activeBuildIdx = 0;
  renderEditor();

  // Spell editor
  spellAbilities = await loadAbilityStatData(name);
  renderSpellEditor(name);
}

function showBanner(name) {
  const portrait = getPortrait(name);
  const abHtml = currentAbilityNames.map((n, i) => {
    if (!n) return '';
    const icon = currentAbilityIcons[i];
    return `<div class="banner-ability">
      ${icon ? `<img src="${esc(icon)}" alt="" onerror="this.style.display='none'">` : ''}
      <div>
        <div class="banner-ability-key ${KEY_COLORS[i]}">${KEY_LABELS[i]}</div>
        <div class="banner-ability-name" title="${esc(n)}">${esc(n)}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('hero-banner').innerHTML = `
    ${portrait ? `<img class="banner-portrait" src="${esc(portrait)}" alt="${esc(name)}" onerror="this.style.display='none'">` : ''}
    <div class="banner-info">
      <div class="banner-hero-name">${esc(name)}</div>
      <div class="banner-abilities">${abHtml}</div>
    </div>`;
  document.getElementById('hero-banner').style.display = 'flex';
}

// ── Render editor ──────────────────────────────────────────
function renderEditor() {
  const isMulti = originalBuilds.length > 1 || originalBuilds[0].label !== null;
  let html = '';

  // Current build strip
  html += '<div class="card" style="margin-bottom:20px"><div class="card-header"><span class="card-title">CURRENT BUILD</span>';
  if (originalBuilds[0].label) html += `<span class="card-label-badge">${esc(originalBuilds[0].label)}</span>`;
  html += '</div><div class="card-body">';
  originalBuilds.forEach((b, i) => {
    if (i > 0) html += `<div style="margin:10px 0 4px"><span class="card-label-badge">${esc(b.label||'Build '+(i+1))}</span></div>`;
    html += renderStrip(b.build, 'strip-'+i);
  });
  html += '</div></div>';

  // Tabs
  html += '<div class="build-tabs">';
  if (isMulti || editBuilds.length > 1) {
    editBuilds.forEach((b, i) => {
      html += `<button class="build-tab${i===activeBuildIdx?' active':''}" onclick="switchBuild(${i})">${esc(b.label||'Build '+(i+1))}</button>`;
    });
  }
  html += `<button class="add-build-btn" onclick="addBuild()">+ ${editBuilds.length>1?'Add Build':'Add 2nd variant'}</button></div>`;

  // Editor
  const b = editBuilds[activeBuildIdx];
  const orig = originalBuilds[activeBuildIdx] || {label:null, build:new Array(18).fill(-1)};
  html += '<div class="card"><div class="card-header"><span class="card-title">EDITING</span>';
  if (editBuilds.length > 1) {
    html += `<div class="label-row"><label>Label:</label><input class="label-input" value="${esc(b.label||'')}" placeholder="e.g. Core" oninput="updateLabel(this.value)"><button class="remove-build-btn" onclick="removeBuild(${activeBuildIdx})">Remove</button></div>`;
  }
  html += '</div><div class="card-body"><div class="editor-grid">';

  for (let i = 0; i < 18; i++) {
    const curVal = b.build[i], origVal = orig.build[i];
    const changed = curVal !== origVal;
    const curLetter = IDX_NAMES[curVal] ?? 'S';
    html += `<div class="editor-row${changed?' is-changed':''}" id="row-${i}">`;
    html += `<span class="row-lvl">Lv${i+1}</span>`;
    html += `<div class="row-current">${badgeHTML(curLetter, 36)}</div>`;
    html += `<span class="row-arrow">→</span>`;
    html += '<div class="row-options">';
    ['Q','W','E','R','S'].forEach(letter => {
      const idx = {Q:0,W:1,E:2,R:3,S:-1}[letter];
      const icon = idx >= 0 ? currentAbilityIcons[idx] : null;
      const aname = idx >= 0 ? currentAbilityNames[idx] : 'Stats';
      const isSel = curLetter === letter;
      html += `<button class="opt-btn${isSel?' '+OPT_CLS[letter]:''}" title="${esc(aname||letter)}" onclick="setSlot(${i},'${letter}')">`;
      if (icon) html += `<img src="${esc(icon)}" alt="" onerror="this.style.display='none'">`;
      html += `<span>${letter}</span></button>`;
    });
    html += '</div>';
    if (changed) {
      const fromName = orig.build[i] >= 0 ? (currentAbilityNames[orig.build[i]] || IDX_NAMES[orig.build[i]]) : 'Stats';
      const toName   = curVal >= 0 ? (currentAbilityNames[curVal] || IDX_NAMES[curVal]) : 'Stats';
      html += `<span class="row-changed-tag"><span class="diff-from">${esc(fromName)}</span><br>→ <span class="diff-to">${esc(toName)}</span></span>`;
    } else {
      html += '<span></span>';
    }
    html += '</div>';
  }
  html += '</div>' + diffSummaryHTML() + '</div></div>';
  document.getElementById('editor-area').innerHTML = html;
  updateSaveBtn();
}

function renderStrip(build, id) {
  let html = `<div class="skill-strip" id="${id}">`;
  build.forEach((v, i) => {
    const letter = IDX_NAMES[v] ?? 'S';
    const icon = (v >= 0 && v <= 3) ? currentAbilityIcons[v] : null;
    html += `<div class="strip-cell"><div class="strip-badge ${BADGE_CLS[letter]}">`;
    html += icon
      ? `<img src="${esc(icon)}" alt="${letter}" onerror="this.outerHTML='${letter}'">`
      : letter;
    html += `</div><div class="strip-lvl">${i+1}</div></div>`;
  });
  return html + '</div>';
}

function badgeHTML(letter, size = 32) {
  const idx = {Q:0,W:1,E:2,R:3}[letter];
  const icon = idx !== undefined ? currentAbilityIcons[idx] : null;
  const inner = icon
    ? `<img src="${esc(icon)}" alt="${letter}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='${letter}'">`
    : letter;
  return `<div class="strip-badge ${BADGE_CLS[letter]}" style="width:${size}px;height:${size}px">${inner}</div>`;
}

function diffSummaryHTML() {
  const b = editBuilds[activeBuildIdx];
  const orig = originalBuilds[activeBuildIdx] || {build:new Array(18).fill(-1)};
  const diffs = b.build.reduce((acc, v, i) => {
    if (v !== (orig.build[i]??-1)) {
      const fromIdx = orig.build[i]??-1, toIdx = v;
      const fromName = fromIdx >= 0 ? (currentAbilityNames[fromIdx]||IDX_NAMES[fromIdx]) : 'Stats';
      const toName   = toIdx   >= 0 ? (currentAbilityNames[toIdx]  ||IDX_NAMES[toIdx])   : 'Stats';
      acc.push({lvl:i+1, fromName, toName});
    }
    return acc;
  }, []);

  let html = `<div class="diff-summary"><div class="diff-title">${diffs.length > 0 ? diffs.length+' pending change'+(diffs.length!==1?'s':'') : 'No changes yet'}</div><div class="diff-list">`;
  html += diffs.length === 0
    ? '<span class="no-changes">Edit the skill order above — changes will appear here</span>'
    : diffs.map(d => `<div class="diff-item">Level <strong>${d.lvl}</strong>: <span class="diff-from">${esc(d.fromName)}</span> → <span class="diff-to">${esc(d.toName)}</span></div>`).join('');
  return html + '</div></div>';
}

// ── Interactions ───────────────────────────────────────────
function switchBuild(idx) { activeBuildIdx = idx; renderEditor(); }
function setSlot(lvl, letter) { editBuilds[activeBuildIdx].build[lvl] = {Q:0,W:1,E:2,R:3,S:-1}[letter]; renderEditor(); }
function updateLabel(val) { editBuilds[activeBuildIdx].label = val; }

function addBuild() {
  if (editBuilds.length === 1 && !editBuilds[0].label) {
    editBuilds[0].label = 'Build 1';
    if (originalBuilds[0].label === null) originalBuilds[0].label = 'Build 1';
  }
  editBuilds.push({label:'Build '+(editBuilds.length+1), build:new Array(18).fill(-1)});
  originalBuilds.push({label:null, build:new Array(18).fill(-1)});
  activeBuildIdx = editBuilds.length - 1;
  renderEditor();
}
function removeBuild(idx) {
  if (editBuilds.length <= 1) return;
  editBuilds.splice(idx,1); originalBuilds.splice(idx,1);
  activeBuildIdx = Math.min(activeBuildIdx, editBuilds.length-1);
  renderEditor();
}

function hasChanges() {
  if (editBuilds.length !== originalBuilds.length) return true;
  for (let bi = 0; bi < editBuilds.length; bi++) {
    if (editBuilds[bi].label !== originalBuilds[bi].label) return true;
    for (let i = 0; i < 18; i++) if (editBuilds[bi].build[i] !== (originalBuilds[bi].build[i]??-1)) return true;
  }
  return false;
}
function updateSaveBtn() { const b = document.getElementById('save-btn'); if (b) b.disabled = !hasChanges(); }

// ── Spell data loader ──────────────────────────────────────
async function loadSpellOverrides() {
  try {
    const res = await fetch('/spell_overrides.json?t=' + Date.now());
    if (res.ok) spellOverridesData = await res.json();
  } catch {}
}

async function loadAbilityStatData(heroName) {
  if (spellStatsCache[heroName]) return spellStatsCache[heroName];
  if (!indexSource) indexSource = await fetch('/index.html').then(r => r.text());
  const escaped = heroName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const m = indexSource.match(new RegExp(`name:"${escaped}"[\\s\\S]{0,300}?abilities:\\[([\\s\\S]{0,2500}?)\\],patches:`));
  if (!m) return (spellStatsCache[heroName] = []);
  const abilities = [];
  for (const line of m[1].split('\n')) {
    const nameM = line.match(/name:"([^"]+)"/);
    if (!nameM) continue;
    const stats = [...line.matchAll(/pill\("([^"]+)","([^"]+)","([^"]+)"\)/g)].map(pm => ({
      type: pm[1], label: pm[2], value: pm[3],
    }));
    abilities.push({ name: nameM[1], stats });
  }
  return (spellStatsCache[heroName] = abilities);
}

// ── Spell editor render ────────────────────────────────────
function renderSpellEditor(heroName) {
  document.getElementById('spell-section').style.display = 'block';
  document.getElementById('spell-save-area').style.display = 'flex';

  if (!spellAbilities.length) {
    document.getElementById('spell-editor-area').innerHTML = '<div class="placeholder"><span>✨</span>No spell data found for this hero</div>';
    return;
  }

  const heroOvr = spellOverridesData[heroName] || {};

  // Build current/edit state
  spellCurrentValues = {};
  spellEditValues = {};
  for (const ab of spellAbilities) {
    spellCurrentValues[ab.name] = {};
    spellEditValues[ab.name] = {};
    for (const st of ab.stats) {
      const live = heroOvr[ab.name]?.[st.label] ?? st.value;
      spellCurrentValues[ab.name][st.label] = live;
      spellEditValues[ab.name][st.label] = live;
    }
  }

  let html = '<div class="spell-abilities-grid">';
  for (const [ai, ab] of spellAbilities.entries()) {
    if (!ab.stats.length) continue;
    const icon = getSpellIconAdmin(heroName, ab.name);
    html += `<div class="spell-ability-card">`;
    html += `<div class="spell-ability-header">`;
    if (icon) html += `<img class="spell-ability-icon" src="${esc(icon)}" alt="" onerror="this.style.display='none'">`;
    html += `<span class="spell-ability-name">${esc(ab.name)}</span></div>`;
    html += `<div class="spell-stat-rows">`;
    for (const [si, st] of ab.stats.entries()) {
      const liveVal = spellCurrentValues[ab.name][st.label];
      const isOvr = heroOvr[ab.name]?.[st.label] !== undefined;
      html += `<div class="spell-stat-row" id="spell-row-${ai}-${si}">`;
      html += `<span class="spell-stat-label">${esc(st.label)}</span>`;
      html += `<div class="spell-stat-input-wrap">`;
      html += `<input class="spell-stat-input" value="${esc(liveVal)}" oninput="spellInputChanged(${ai},${si},this.value)">`;
      if (isOvr) html += `<span class="spell-stat-base">base: ${esc(st.value)}</span>`;
      html += `</div>`;
      html += `<span class="spell-changed-tag" id="spell-tag-${ai}-${si}" style="display:none">changed</span>`;
      html += `</div>`;
    }
    html += `</div></div>`;
  }
  html += '</div>';
  html += '<div class="diff-summary" id="spell-diff" style="margin-top:14px"><div class="diff-title">No changes yet</div><div class="diff-list"><span class="no-changes">Edit values above — changes will appear here</span></div></div>';

  document.getElementById('spell-editor-area').innerHTML = html;
  updateSpellSaveBtn();
}

function spellInputChanged(ai, si, value) {
  const ab = spellAbilities[ai]; if (!ab) return;
  const st = ab.stats[si]; if (!st) return;
  spellEditValues[ab.name][st.label] = value;
  const changed = value !== spellCurrentValues[ab.name][st.label];
  const rowEl = document.getElementById(`spell-row-${ai}-${si}`);
  const tagEl = document.getElementById(`spell-tag-${ai}-${si}`);
  if (rowEl) rowEl.classList.toggle('is-changed', changed);
  if (tagEl) tagEl.style.display = changed ? '' : 'none';
  updateSpellDiff();
  updateSpellSaveBtn();
}

function updateSpellDiff() {
  const diffs = [];
  for (const ab of spellAbilities) {
    for (const st of ab.stats) {
      const edited = spellEditValues[ab.name]?.[st.label];
      const orig = spellCurrentValues[ab.name]?.[st.label];
      if (edited !== undefined && edited !== orig) diffs.push({ ability: ab.name, label: st.label, from: orig, to: edited });
    }
  }
  const el = document.getElementById('spell-diff'); if (!el) return;
  if (!diffs.length) {
    el.innerHTML = '<div class="diff-title">No changes yet</div><div class="diff-list"><span class="no-changes">Edit values above — changes will appear here</span></div>';
  } else {
    let html = `<div class="diff-title">${diffs.length} pending change${diffs.length!==1?'s':''}</div><div class="diff-list">`;
    html += diffs.map(d => `<div class="diff-item"><strong>${esc(d.ability)}</strong> — ${esc(d.label)}: <span class="diff-from">${esc(d.from)}</span> → <span class="diff-to">${esc(d.to)}</span></div>`).join('');
    el.innerHTML = html + '</div>';
  }
}

function hasSpellChanges() {
  for (const ab of spellAbilities)
    for (const st of ab.stats)
      if ((spellEditValues[ab.name]?.[st.label]??'') !== (spellCurrentValues[ab.name]?.[st.label]??'')) return true;
  return false;
}
function updateSpellSaveBtn() { const b = document.getElementById('spell-save-btn'); if (b) b.disabled = !hasSpellChanges(); }

async function saveSpellChanges() {
  const btn = document.getElementById('spell-save-btn');
  const status = document.getElementById('spell-save-status');
  btn.disabled = true;
  status.className = 'save-status loading';
  status.textContent = 'Saving…';

  const changes = [];
  for (const ab of spellAbilities) {
    const changedStats = {};
    for (const st of ab.stats) {
      const edited = spellEditValues[ab.name]?.[st.label];
      if (edited !== undefined && edited !== (spellCurrentValues[ab.name]?.[st.label] ?? ''))
        changedStats[st.label] = edited;
    }
    if (Object.keys(changedStats).length) changes.push({ abilityName: ab.name, stats: changedStats });
  }
  if (!changes.length) { btn.disabled = false; status.textContent = ''; return; }

  try {
    const res = await fetch('/api/save-spell', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({heroName:selectedHero, changes}) });
    const data = await res.json();
    if (!res.ok) {
      status.className = 'save-status err';
      status.textContent = data.error || 'Save failed';
      btn.disabled = false;
      return;
    }
    // Update local state so diff is correct after save
    if (!spellOverridesData[selectedHero]) spellOverridesData[selectedHero] = {};
    for (const { abilityName, stats } of changes) {
      if (!spellOverridesData[selectedHero][abilityName]) spellOverridesData[selectedHero][abilityName] = {};
      Object.assign(spellOverridesData[selectedHero][abilityName], stats);
      Object.assign(spellCurrentValues[abilityName], stats);
    }
    status.className = 'save-status ok';
    status.textContent = '✓ Saved! Redeploying (~30s)…';
    setTimeout(() => { status.textContent = ''; updateSpellSaveBtn(); }, 5000);
  } catch {
    status.className = 'save-status err';
    status.textContent = 'Network error — check your connection';
    btn.disabled = false;
  }
}

// ── Save ───────────────────────────────────────────────────
async function saveChanges() {
  const btn = document.getElementById('save-btn');
  const status = document.getElementById('save-status');
  btn.disabled = true;
  status.className = 'save-status loading';
  status.textContent = 'Saving…';
  const builds = (editBuilds.length===1 && !editBuilds[0].label)
    ? editBuilds[0].build
    : editBuilds.map(b => ({label:b.label||'', build:b.build}));
  try {
    const res = await fetch('/api/save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({heroName:selectedHero, builds})});
    const data = await res.json();
    if (!res.ok) {
      status.className = 'save-status err';
      status.textContent = data.error || 'Save failed';
      btn.disabled = false;
      return;
    }
    status.className = 'save-status ok';
    status.textContent = '✓ Saved! Redeploying (~30s)…';
    originalBuilds = editBuilds.map(b => ({label:b.label, build:[...b.build]}));
    SKILL_BUILDS[selectedHero] = builds;
    setTimeout(() => { status.textContent = ''; updateSaveBtn(); }, 5000);
  } catch {
    status.className = 'save-status err';
    status.textContent = 'Network error — check your connection';
    btn.disabled = false;
  }
}
</script>
