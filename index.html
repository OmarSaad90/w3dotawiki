<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W3Dota Allstars - Community Wiki</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {

   --bg:#050508;
  --surface:#14141f;     /* Lighter than pure black */
  --surface2:#1c1c2a;    /* Even lighter for header */
  --border:#2a2a40;      /* Visible border */
  --str:#d44332; --agi:#2ecc71; --int:#3498db;
  --str-glow:rgba(212,67,50,.12); --agi-glow:rgba(46,204,113,.12); --int-glow:rgba(52,152,219,.12);
  --gold:#c9a84c; --gold-bright:#f0cc6a; --text:#d0cab8; --text-dim:#9a9080; --accent:#e8c87a;
  --dmg:#e07050; --cd:#70b8e0; --mana:#8090e0;
}
*{box-sizing:border-box;margin:0;padding:0;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
body{
  background-color:#07070e;
  background-image:
    repeating-linear-gradient(0deg, transparent 0, transparent 79px, rgba(130,105,45,.09) 79px, rgba(130,105,45,.09) 80px),
    repeating-linear-gradient(90deg, transparent 0, transparent 79px, rgba(130,105,45,.09) 79px, rgba(130,105,45,.09) 80px),
    repeating-linear-gradient(0deg, transparent 0, transparent 19px, rgba(255,255,255,.014) 19px, rgba(255,255,255,.014) 20px),
    repeating-linear-gradient(90deg, transparent 0, transparent 19px, rgba(255,255,255,.014) 19px, rgba(255,255,255,.014) 20px);
  color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:16px;line-height:1.5;
}

header{background:linear-gradient(180deg,#060810 0%,transparent 100%);border-bottom:1px solid var(--border);padding:20px;text-align:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
header h1{font-family:'Cinzel',serif;font-size:clamp(1.2rem,3.5vw,1.9rem);color:var(--gold);letter-spacing:4px;}
.subtitle{color:var(--text-dim);font-size:.85rem;}
.patch-note{display:inline-block;margin-top:5px;background:#111a28;border:1px solid #2a3d5a;color:#7ab4e8;font-size:.72rem;padding:2px 10px;border-radius:20px;}
.controls{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:11px;}
.controls input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 13px;border-radius:4px;width:200px;outline:none;}
.filter-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:6px 13px;border-radius:4px;cursor:pointer;font-family:'Cinzel',serif;font-size:.7rem;}
.filter-btn.all.active{border-color:var(--gold);color:var(--gold);}
.filter-btn.str{border-color:rgba(212,67,50,.35);color:rgba(212,67,50,.6);}
.filter-btn.str.active{border-color:var(--str);color:var(--str);background:rgba(212,67,50,.07);}
.filter-btn.agi{border-color:rgba(46,204,113,.35);color:rgba(46,204,113,.6);}
.filter-btn.agi.active{border-color:var(--agi);color:var(--agi);background:rgba(46,204,113,.07);}
.filter-btn.int{border-color:rgba(52,152,219,.35);color:rgba(52,152,219,.6);}
.filter-btn.int.active{border-color:var(--int);color:var(--int);background:rgba(52,152,219,.07);}
.filter-btn.sentinel.active{border-color:#3a8ad4;color:#70a8e0;}
.filter-btn.scourge.active{border-color:#c0392b;color:#e07060;}
.filter-btn.guides{border-color:rgba(201,168,76,.3);color:rgba(201,168,76,.55);}
.filter-btn.guides.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.07);}
.role-filter-btn{border-color:rgba(192,132,252,.3) !important;color:rgba(192,132,252,.6) !important;}
.role-filter-btn.role-active{border-color:#c084fc !important;color:#c084fc !important;background:rgba(192,132,252,.07) !important;}
.role-dropdown{position:relative;display:inline-block;}
.role-filter-btn.role-active{border-color:var(--gold);color:var(--gold);}
.role-dropdown-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:4px;z-index:200;min-width:130px;padding:4px 0;box-shadow:0 4px 16px rgba(0,0,0,.5);}
.role-dropdown-menu.open{display:block;}
.role-dropdown-item{display:block;padding:6px 14px;color:var(--text-dim);font-family:'Cinzel',serif;font-size:.7rem;cursor:pointer;white-space:nowrap;width:100%;text-align:left;background:none;border:none;}
.role-dropdown-item:hover{color:var(--gold);background:rgba(200,160,60,.08);}
.role-dropdown-item.active{color:var(--gold);}
.role-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.role-pill{font-size:.58rem;padding:2px 6px;border-radius:3px;font-family:'Cinzel',serif;letter-spacing:.02em;border:1px solid;opacity:.85;}
.role-pill.carry{color:#d4a843;border-color:rgba(212,168,67,.4);background:rgba(212,168,67,.08);}
.role-pill.support{color:#5b9bd5;border-color:rgba(91,155,213,.4);background:rgba(91,155,213,.08);}
.role-pill.ganker{color:#e07060;border-color:rgba(224,112,96,.4);background:rgba(224,112,96,.08);}
.role-pill.initiator{color:#5db87a;border-color:rgba(93,184,122,.4);background:rgba(93,184,122,.08);}
.role-pill.nuker{color:#c084fc;border-color:rgba(192,132,252,.4);background:rgba(192,132,252,.08);}
.role-pill.disabler{color:#94a3b8;border-color:rgba(148,163,184,.4);background:rgba(148,163,184,.08);}
.role-pill.escape{color:#2dd4bf;border-color:rgba(45,212,191,.4);background:rgba(45,212,191,.08);}
.role-pill.semi{color:#fb923c;border-color:rgba(251,146,60,.4);background:rgba(251,146,60,.08);}

/* ── Guides Page ─────────────────────────────────────────────────────────── */
#guides-view{display:none;max-width:1400px;margin:0 auto;padding:20px 16px;grid-template-columns:repeat(auto-fill,minmax(min(400px,100%),1fr));gap:16px;align-items:start;}
.guide-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.guide-card.str{border-top:3px solid var(--str);}
.guide-card.agi{border-top:3px solid var(--agi);}
.guide-card.int{border-top:3px solid var(--int);}
.guide-card.misc{border-top:3px solid var(--gold);}
.guide-card.str .guide-header{background:linear-gradient(105deg,rgba(212,67,50,.1) 0%,var(--surface2) 60%);}
.guide-card.agi .guide-header{background:linear-gradient(105deg,rgba(46,204,113,.08) 0%,var(--surface2) 60%);}
.guide-card.int .guide-header{background:linear-gradient(105deg,rgba(52,152,219,.1) 0%,var(--surface2) 60%);}
.guide-card.misc .guide-header{background:linear-gradient(105deg,rgba(201,168,76,.1) 0%,var(--surface2) 60%);}
.guide-header{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:14px;}
.guide-portrait{width:62px;height:54px;border-radius:4px;overflow:hidden;background:#0a0e18;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.05);}
.guide-portrait img{width:100%;height:100%;object-fit:contain;}
.guide-portrait.ward img{width:46px;height:46px;}
.guide-info{flex:1;}
.guide-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold-bright);margin-bottom:6px;}
.guide-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.guide-author-badge{font-family:'Cinzel',serif;font-size:.7rem;padding:2px 10px;border-radius:12px;}
.guide-card.str .guide-author-badge{background:rgba(212,67,50,.15);color:var(--str);border:1px solid rgba(212,67,50,.3);}
.guide-card.agi .guide-author-badge{background:rgba(46,204,113,.15);color:var(--agi);border:1px solid rgba(46,204,113,.3);}
.guide-card.int .guide-author-badge{background:rgba(52,152,219,.15);color:var(--int);border:1px solid rgba(52,152,219,.3);}
.guide-card.misc .guide-author-badge{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.3);}
.guide-date{font-size:.7rem;color:var(--text-dim);}
.guide-attr-badge{font-family:'Cinzel',serif;font-size:.6rem;padding:2px 6px;border-radius:3px;margin-left:2px;}
.guide-card.str .guide-attr-badge{background:rgba(212,67,50,.15);color:var(--str);}
.guide-card.agi .guide-attr-badge{background:rgba(46,204,113,.15);color:var(--agi);}
.guide-card.int .guide-attr-badge{background:rgba(52,152,219,.15);color:var(--int);}
.guide-card.misc .guide-attr-badge{background:rgba(201,168,76,.12);color:var(--gold);}
.guide-section{margin-bottom:16px;}
.guide-section:last-child{margin-bottom:0;}
.guide-section-heading{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:1.5px;color:var(--accent);margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid rgba(201,168,76,.12);}
.guide-section-text{font-size:.9rem;color:var(--text);line-height:1.8;white-space:pre-line;}
.guide-body{padding:16px 18px;position:relative;}
.guide-body.collapsed{max-height:180px;overflow:hidden;}
.guide-body.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,var(--surface));pointer-events:none;}
.guide-expand-btn{width:100%;background:none;border:none;border-top:1px solid var(--border);color:var(--text-dim);font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:1px;padding:7px;cursor:pointer;transition:color .15s,background .15s;}
.guide-expand-btn:hover{background:rgba(255,255,255,.03);color:var(--accent);}

.stats-bar{text-align:center;padding:7px;color:var(--text-dim);border-bottom:1px solid var(--border);}
.stats-bar span{color:var(--gold-bright);font-family:'Cinzel',serif;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(380px,100%),1fr));gap:14px;padding:16px;max-width:1600px;margin:0 auto;}

.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}
.hero-card:hover { transform: translateY(-4px); }
.hero-card.str:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 22px rgba(212,67,50,.25); border-color: rgba(212,67,50,.4); }
.hero-card.agi:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 22px rgba(46,204,113,.2);  border-color: rgba(46,204,113,.35); }
.hero-card.int:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 22px rgba(52,152,219,.25); border-color: rgba(52,152,219,.4); }

/* Better ability icons spacing */
.ability-icon {
  background: #000000;
}
.attr-badge {
  font-family:'Cinzel',serif;
  font-size:.65rem;
  padding:3px 8px;
  border-radius:4px;
  font-weight:bold;
}
.str .attr-badge{background:#d44332;color:#fff;}
.agi .attr-badge{background:#2ecc71;color:#000;}
.int .attr-badge{background:#3498db;color:#fff;}

/* Make spell stats more readable */
.stat-pill {
  background: rgba(30,30,40,0.8);
  font-size: .68rem;
}

/* Darker patch notes background */
.patch-changes {
  background: rgba(0,0,0,0.5);
}
.hero-card.str{border-top:3px solid var(--str);}
.hero-card.agi{border-top:3px solid var(--agi);}
.hero-card.int{border-top:3px solid var(--int);}

.hero-header{display:flex;align-items:center;border-bottom:1px solid var(--border);}
.hero-card.str .hero-header{background:linear-gradient(105deg,rgba(212,67,50,.12) 0%,var(--surface2) 55%);}
.hero-card.agi .hero-header{background:linear-gradient(105deg,rgba(46,204,113,.1) 0%,var(--surface2) 55%);}
.hero-card.int .hero-header{background:linear-gradient(105deg,rgba(52,152,219,.12) 0%,var(--surface2) 55%);}
.hero-portrait{width:72px;height:62px;flex-shrink:0;position:relative;background:#0a0e18;border-radius:4px;overflow:hidden;}
.hero-portrait img{width:100%;height:100%;object-fit:contain;}
.fallback-icon{display:none;}
.hero-portrait img.err{opacity:1;}
.hero-title-area{flex:1;padding:7px 11px;}
.hero-title-area h2{font-family:'Cinzel',serif;font-size:.95rem;color:#f5e098;}
.hero-title-area .tagline{font-size:.78rem;color:#a8a090;font-style:italic;}
.hero-badges{display:flex;flex-direction:column;gap:3px;align-items:flex-end;padding:5px 9px;}
.attr-badge{font-family:'Cinzel',serif;font-size:.62rem;padding:2px 6px;border-radius:3px;}
.str .attr-badge{background:rgba(212,67,50,.15);color:var(--str);}
.agi .attr-badge{background:rgba(46,204,113,.15);color:var(--agi);}
.int .attr-badge{background:rgba(52,152,219,.15);color:var(--int);}
.faction-badge{font-size:.58rem;padding:1px 5px;border-radius:3px;font-family:'Cinzel',serif;}
.sentinel .faction-badge{color:#70a8e0;background:rgba(58,138,212,.1);}
.scourge .faction-badge{color:#e08070;background:rgba(192,57,43,.1);}
.diff-badge{font-size:.58rem;padding:1px 5px;border-radius:3px;font-family:'Cinzel',serif;}
.diff-badge.easy{color:#58c058;background:rgba(60,160,60,.1);}
.diff-badge.medium{color:#c9a84c;background:rgba(201,168,76,.1);}
.diff-badge.hard{color:#e05858;background:rgba(200,60,60,.1);}

.hero-body{padding:11px 13px;}
.hero-desc{font-size:.88rem;color:var(--text);margin-bottom:9px;line-height:1.6;}
.section-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:2px;color:#8a8070;margin-bottom:5px;}

.abilities{display:flex;flex-direction:column;gap:6px;}
.ability{background:var(--bg);border:1px solid #1a2030;border-radius:5px;overflow:hidden;}
.ability.ult{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.03);}
.ability-top{display:flex;align-items:flex-start;}
.ability-icon{width:40px;height:40px;flex-shrink:0;background:#050810;border-right:1px solid #1a2030;display:flex;align-items:center;justify-content:center;}
.ability-icon img{width:32px;height:32px;object-fit:contain;}
.ability-icon .no-icon{font-size:1rem;color:#2a3040;}
.ability-content{flex:1;padding:5px 8px;}
.ability-name{font-family:'Cinzel',serif;font-size:.78rem;color:#c8a050;margin-bottom:2px;}
.ability.ult .ability-name{color:var(--gold-bright);}
.ability-desc{font-size:.83rem;color:#a09888;line-height:1.55;}
.spell-stats{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.stat-pill{font-size:.7rem;padding:1px 6px;border-radius:3px;background:rgba(100,100,150,.15);}
.aghanim-upgrade{display:flex;align-items:flex-start;gap:8px;margin-top:8px;padding:6px 8px;background:rgba(110,60,220,.12);border:1px solid rgba(150,90,255,.3);border-radius:4px;}
.aghanim-upgrade .agh-icon{width:28px;height:28px;object-fit:contain;flex-shrink:0;border-radius:3px;border:1px solid rgba(150,90,255,.4);}
.aghanim-upgrade .agh-text{flex:1;}
.aghanim-upgrade .agh-label{font-family:'Cinzel',serif;font-size:.68rem;color:#b388ff;margin-bottom:2px;letter-spacing:.03em;}
.aghanim-upgrade .agh-desc{font-size:.78rem;color:#c0a8f0;line-height:1.4;}

.patch-changes{margin-top:8px;padding:6px 9px;background:rgba(30,45,70,.3);border:1px solid rgba(58,106,170,.28);border-radius:4px;}
.patch-changes-label{font-family:'Cinzel',serif;font-size:.63rem;color:#7aaade;margin-bottom:3px;cursor:pointer;user-select:none;background:none;border:none;padding:0;width:100%;text-align:left;}
.patch-changes-label:hover{color:#a0caee;}
.patch-change-item{font-size:.78rem;color:#7a9ac0;padding-left:11px;position:relative;}
.patch-change-item::before{content:'▸';position:absolute;left:0;color:#4a7ab0;}

/* ── WC3 Page Frame ──────────────────────────────────────────────────────── */
#wc3-frame{position:fixed;inset:0;pointer-events:none;z-index:9999;
  border:1px solid rgba(201,168,76,.22);
  box-shadow:inset 0 0 0 3px rgba(0,0,0,.6), inset 0 0 80px rgba(0,0,0,.25);}
#wc3-frame .fc{position:absolute;width:22px;height:22px;border-color:rgba(201,168,76,.7);border-style:solid;}
#wc3-frame .tl{top:7px;left:7px;border-width:2px 0 0 2px;}
#wc3-frame .tr{top:7px;right:7px;border-width:2px 2px 0 0;}
#wc3-frame .bl{bottom:7px;left:7px;border-width:0 0 2px 2px;}
#wc3-frame .br{bottom:7px;right:7px;border-width:0 2px 2px 0;}
/* ── Dust Canvas ─────────────────────────────────────────────────────────── */
#dust-canvas{position:fixed;inset:0;pointer-events:none;z-index:1;}

/* ── Matchups ─────────────────────────────────────────────────────────────── */
.matchup-section{margin-top:8px;padding:6px 9px;background:rgba(18,13,4,.45);border:1px solid rgba(122,96,48,.28);border-radius:4px;}
.matchup-header{font-family:'Cinzel',serif;font-size:.63rem;color:#c9a84c;margin-bottom:6px;}
.matchup-body{}
.mu-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;}
.mu-row:last-child{margin-bottom:0;}
.mu-label{font-family:'Cinzel',serif;font-size:.58rem;white-space:nowrap;min-width:82px;padding-top:4px;letter-spacing:.03em;}
.mu-label.mu-bad{color:#e05858;}
.mu-label.mu-good{color:#58c058;}
.mu-label.mu-synergy{color:#7090e8;}
.mu-heroes{display:flex;gap:6px;flex-wrap:wrap;}
.mu-hero{display:flex;align-items:center;gap:4px;}
.mu-hero img{width:28px;height:28px;object-fit:cover;border-radius:3px;border:1px solid #2a2a3a;}
.mu-hero span{font-size:.62rem;color:#b8af96;}

.no-results{grid-column:1/-1;text-align:center;padding:60px;color:var(--text-dim);}
.top-items{margin-top:8px;padding:6px 9px;background:rgba(4,16,4,.35);border:1px solid rgba(58,90,58,.28);border-radius:4px;}
.top-items-label{font-family:'Cinzel',serif;font-size:.63rem;color:#6aaa6a;margin-bottom:5px;}
.top-items-icons{display:flex;flex-wrap:wrap;gap:3px;}
.top-items-icons img{height:28px;width:28px;object-fit:contain;border-radius:2px;opacity:.9;transition:opacity .15s;}
.top-items-icons img:hover{opacity:1;}

/* ── Skill Order ─────────────────────────────────────────────────────────── */
.skill-order{margin-top:8px;padding:6px 9px;background:rgba(12,4,18,.35);border:1px solid rgba(90,58,106,.28);border-radius:4px;}
.skill-order-label{font-family:'Cinzel',serif;font-size:.63rem;color:#a07ac0;margin-bottom:6px;}
.skill-order-strip{display:flex;gap:2px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;}
.skill-order-strip::-webkit-scrollbar{height:7px;}
.skill-order-strip::-webkit-scrollbar-track{background:#0a0a12;border-radius:4px;}
.skill-order-strip::-webkit-scrollbar-thumb{background:linear-gradient(90deg,#3a2a10,#8a6a28,#c9a84c,#8a6a28,#3a2a10);border-radius:4px;border:1px solid #2a1e08;}
.skill-order-strip::-webkit-scrollbar-thumb:hover{background:linear-gradient(90deg,#5a4018,#b08a38,#f0cc6a,#b08a38,#5a4018);}
.so-cell{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:28px;}
.so-cell .so-icon-wrap{width:26px;height:26px;border-radius:3px;overflow:hidden;position:relative;border:1px solid #2a2a40;}
.so-cell .so-icon-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.so-cell .so-icon-wrap.is-ult{border-color:rgba(201,168,76,.7);box-shadow:0 0 5px rgba(201,168,76,.35);}
.so-cell .so-icon-wrap.is-stats{background:#1a1a25;border-color:#2a2a3a;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#4a4a60;}
.so-cell .so-lvl{font-size:.6rem;color:#6a6285;margin-top:2px;font-family:'Cinzel',serif;}

/* ── Base Stats Section ─────────────────────────────────────────────────── */
.base-stats { padding: 4px 10px 6px; }
.bs-attr-row {
  display: flex; gap: 22px; margin: 4px 0 8px; align-items: baseline;
}
.bs-attr {
  display: flex; align-items: baseline; gap: 5px; cursor: default;
}
.bs-attr-label {
  font-size: .65rem; font-weight: 700; letter-spacing: .08em;
  opacity: .6; font-family: 'Cinzel', serif;
}
.bs-attr-val  { font-size: 1rem; font-weight: 700; }
.bs-attr-gain { font-size: .74rem; opacity: .72; }
.bs-attr.str  { color: var(--str); }
.bs-attr.agi  { color: var(--agi); }
.bs-attr.int  { color: var(--int); }
.bs-combat-row {
  display: flex; flex-wrap: wrap; gap: 4px 16px; margin-bottom: 2px;
}
.bs-stat {
  display: flex; align-items: baseline; gap: 4px;
  font-size: .78rem; cursor: default;
}
.bs-stat-lbl  { color: var(--text-dim); font-size: .68rem; }
.bs-stat-val  { color: var(--text); font-weight: 500; }
.bs-stat small { font-size: .65rem; color: var(--text-dim); }

/* ═══════════════════════════════════════════════════════════════════════════
   UI ENHANCEMENT LAYER — delete from here to "End Enhancement Layer" to revert
   ═══════════════════════════════════════════════════════════════════════════ */

/* 1. Atmospheric background — gold aura at top over stone tile texture */
body {
  background-image:
    radial-gradient(ellipse 120% 35% at 50% 0%, rgba(201,168,76,.07) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent 0, transparent 79px, rgba(130,105,45,.09) 79px, rgba(130,105,45,.09) 80px),
    repeating-linear-gradient(90deg, transparent 0, transparent 79px, rgba(130,105,45,.09) 79px, rgba(130,105,45,.09) 80px),
    repeating-linear-gradient(0deg, transparent 0, transparent 19px, rgba(255,255,255,.014) 19px, rgba(255,255,255,.014) 20px),
    repeating-linear-gradient(90deg, transparent 0, transparent 19px, rgba(255,255,255,.014) 19px, rgba(255,255,255,.014) 20px);
}

/* 2. Title shimmer — slow pulse glow on the gold heading */
@keyframes goldShimmer {
  0%,100% { text-shadow: 0 0 16px rgba(201,168,76,.10), 0 2px 4px rgba(0,0,0,.8); }
  50%      { text-shadow: 0 0 36px rgba(201,168,76,.45), 0 0 72px rgba(201,168,76,.18), 0 2px 4px rgba(0,0,0,.8); }
}
header h1 { animation: goldShimmer 5s ease-in-out infinite; }

/* 3. Header — slightly richer gradient */
header { background: linear-gradient(180deg, #07090f 0%, #0a0c14 60%, transparent 100%); }

/* 4. Search — gold glow on focus */
.controls input { transition: border-color .2s, box-shadow .2s, color .2s; }
.controls input:focus {
  border-color: rgba(201,168,76,.55);
  box-shadow: 0 0 0 3px rgba(201,168,76,.07), 0 0 20px rgba(201,168,76,.14);
  color: var(--gold-bright);
  outline: none;
}

/* 5. Filter buttons — lift on hover */
.filter-btn { transition: transform .15s, box-shadow .15s, border-color .15s, color .15s; }
.filter-btn:hover:not(.active) {
  transform: translateY(-2px);
  box-shadow: 0 4px 14px rgba(0,0,0,.55);
  border-color: rgba(255,255,255,.14);
  color: var(--text);
}

/* 6. Card entrance animation */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: none; }
}
.hero-card { animation: cardIn .38s ease both; }

/* 7. Hero name warms on card hover */
.hero-title-area h2 { transition: color .2s; }
.hero-card:hover .hero-title-area h2 { color: #fef3c0; }

/* 8. Ability — icon brightens + gold drop-shadow on hover */
.ability-icon img { transition: filter .2s; }
.ability:hover .ability-icon img {
  filter: brightness(1.18) drop-shadow(0 0 5px rgba(201,168,76,.25));
}

/* 9. Stat pills — distinct colors per type (dmg/cd/mana/dur/range) */
.stat-pill.dmg   { background: rgba(210,80,55,.18);  color: #e09888; border: 1px solid rgba(210,80,55,.2); }
.stat-pill.cd    { background: rgba(70,155,215,.14);  color: #88c4e4; border: 1px solid rgba(70,155,215,.2); }
.stat-pill.mana  { background: rgba(100,110,215,.16); color: #a8b4e8; border: 1px solid rgba(100,110,215,.2); }
.stat-pill.dur   { background: rgba(180,145,55,.14);  color: #d4ba78; border: 1px solid rgba(180,145,55,.2); }
.stat-pill.range { background: rgba(75,175,115,.13);  color: #82c89a; border: 1px solid rgba(75,175,115,.18); }

/* 10. Item icons — scale pop on hover */
.top-items-icons img { transition: transform .15s ease, opacity .15s ease; transform-origin: bottom center; }
.top-items-icons img:hover { opacity: 1; transform: scale(1.22) translateY(-3px); position: relative; z-index: 1; }

/* 11. Skill order cells — gold border glow on hover */
.so-cell { transition: transform .12s; }
.so-cell:hover { transform: translateY(-2px); }
.so-cell:hover .so-icon-wrap {
  border-color: rgba(201,168,76,.55);
  box-shadow: 0 0 8px rgba(201,168,76,.28);
  transition: border-color .15s, box-shadow .15s;
}

/* 12. Custom gold scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #060608; border-left: 1px solid #14141e; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #3a2a10 0%, #8a6a28 40%, #c9a84c 60%, #8a6a28 80%, #3a2a10 100%);
  border-radius: 4px;
  border: 1px solid #2a1e08;
}
::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, #5a4018 0%, #b08a38 40%, #f0cc6a 60%, #b08a38 80%, #5a4018 100%);
}

/* 13. Hero portrait frames — attr-colored inner glow */
.hero-portrait {
  box-shadow: inset 0 0 10px rgba(0,0,0,.9), 0 0 0 1px rgba(0,0,0,.8);
}
.hero-card.str .hero-portrait { box-shadow: inset 0 0 10px rgba(0,0,0,.9), 0 0 0 1px rgba(212,67,50,.35), 0 0 8px rgba(212,67,50,.12); }
.hero-card.agi .hero-portrait { box-shadow: inset 0 0 10px rgba(0,0,0,.9), 0 0 0 1px rgba(46,204,113,.28), 0 0 8px rgba(46,204,113,.10); }
.hero-card.int .hero-portrait { box-shadow: inset 0 0 10px rgba(0,0,0,.9), 0 0 0 1px rgba(52,152,219,.35), 0 0 8px rgba(52,152,219,.12); }

/* 14. Ornamental section dividers — ──── ✦ ──── either side of label text */
.section-label {
  display: flex;
  align-items: center;
  gap: 7px;
}
.section-label::before,
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,.22), transparent);
}

/* ═══════════════════════════════════════════════════════════════════════════
   End UI Enhancement Layer
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── Readability pass ───────────────────────────────────────────────────── */

/* Raise minimum font sizes — Cinzel below 10.5px loses legibility */
.role-pill             { font-size: .65rem; }
.faction-badge,
.diff-badge            { font-size: .65rem; }
.mu-label              { font-size: .65rem; min-width: 78px; }
.mu-hero span          { font-size: .7rem;  color: #b8b0a0; }
.attr-badge            { font-size: .66rem; }
.guide-attr-badge      { font-size: .65rem; }
.patch-changes-label,
.skill-order-label,
.top-items-label,
.matchup-header        { font-size: .7rem; }
.section-label         { font-size: .72rem; }

/* text-wrap on hero name prevents awkward orphan words at narrow widths */
.hero-title-area h2    { text-wrap: balance; }

/* Respect user motion preferences */
@media (prefers-reduced-motion: reduce) {

function getSpellIcon(heroName, spellName) {
  // Priority 1: local BTN icons (WC3 originals)
  const btn = SPELL_ICONS[spellName];
  if (btn) return btn.includes('.') ? `${ICON_BASE}${btn}` : `${ICON_BASE}${btn}.jpg`;
  // Priority 2: WoW Classic CDN icons (authentic DotA1-era)
  const wow = WOW_ICONS[spellName];
  if (wow) return `${WOW_BASE}${wow}.jpg`;
  // Priority 3: explicit Dota2 overrides (renamed abilities)
  const d2 = DOTA2_ICONS[spellName];
  if (d2) return d2.startsWith('http') ? d2 : `${DOTA2_BASE}${d2}.png`;
  // Priority 4: Dota 2 CDN auto-generated URL
  const hk = HERO_KEYS[heroName];
  if (!hk) return null;
  const ak = spellName.toLowerCase().replace(/['']/g,'').replace(/[^a-z0-9]+/g,'_').replace(/_$/,'');
  return `${DOTA2_BASE}${hk}_${ak}.png`;
}

function pill(type, label, val) {
  return `<span class="stat-pill ${type}"><b>${label}</b> ${val}</span>`;
}

// ========== RENDER FUNCTIONS ==========
let activeFilter = 'all';
let activeRole = 'all';
let searchQuery = '';
let guidesActive = false;
const ROLE_LABELS = {carry:'Carry',support:'Support',ganker:'Ganker',initiator:'Initiator',nuker:'Nuker',disabler:'Disabler',escape:'Escape',semi:'Semi-Carry'};

function toggleRoleDropdown() {
  const menu = document.getElementById('roleMenu');
  const btn = document.getElementById('roleBtn');
  const isOpen = menu.classList.toggle('open');
  btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
}
function setRole(role) {
  activeRole = role;
  const menu = document.getElementById('roleMenu');
  menu.classList.remove('open');
  menu.querySelectorAll('.role-dropdown-item').forEach(el => el.classList.remove('active'));
  [...menu.querySelectorAll('.role-dropdown-item')].find(el => el.textContent.trim() === (role === 'all' ? 'All Roles' : ROLE_LABELS[role]))?.classList.add('active');
  const btn = document.getElementById('roleBtn');
  btn.textContent = (role === 'all' ? 'Role \u25BE' : ROLE_LABELS[role] + ' \u25BE');
  btn.classList.toggle('role-active', role !== 'all');
  btn.setAttribute('aria-expanded', 'false');
  render();
}
document.addEventListener('click', e => {
  if (!document.getElementById('roleDropdown').contains(e.target)) {
    document.getElementById('roleMenu').classList.remove('open');
    document.getElementById('roleBtn').setAttribute('aria-expanded', 'false');
  }
});

        text: "Abyssal Blade — almost always best, helps burst heroes quickly.\nBlink Dagger — great for mobility, make it 3rd or 4th item.\nLinkens Sphere — vs Rexxar Roar or Doom.\nMKB — vs PA, WR, or any Butterfly builder.\nSilver Edge — turn your Sange into SE vs Bristleback, Spectre, Timbersaw.\nRadiance — niche, useful vs illusions or 5-dagger lineups.\nBKB/Manta — if enemy damage is mostly magic or they have global silences." },
      { heading: "Laning",
        text: "In 2v2 lanes: farm safely for the first level, finish up Wand/PMS/Boots. Start Feast unless you see kill potential with Open Wounds. Use your support as a meat shield and go for the lowest HP enemy.\n\nNaix can go 1v1 mid/offlane vs a melee STR hero, but still needs farm — if you have another farmer on the team, it's not recommended.\n\nFor Infest, best allies are jumping heroes: Slardar, Earthshaker, Spirit Breaker. Goal: burst a hero with the jump before they can react." },
      { heading: "Farming",
        text: "Thanks to his passive, Naix can kill neutrals at any level. Once you have Phase and Gloves of Haste, slightly push the lane and farm nearby big neutrals simultaneously.\n\nNaix can farm Ancients at level 7+ — they give a lot of gold, abuse this.\n\nNaix can push lanes alone if there are no Rage-piercing stuns (Roar, Swap, Dismember, Axe Call). Use Rage + TP for escape." },
      { heading: "Skill Build",
        text: "ALWAYS max Feast first — it provides the most damage for farming and kills. Maxing Rage before Feast is useless.\n\nRecommended: 2-3-1-2-2-4-2-3-1-1-1-3\n\nLevel 1: Feast or Open Wounds depending on kill potential. Open Wounds has garbage range at level 1, so getting it at level 2 before maxing Rage gives you kill threat in lane." },
      { heading: "Farming vs Fighting",
        text: "Naix does not require AFK farming. Get your Armlet early (<11 min) and only join fights you can get free kills from.\n\nAlways be doing something — don't AFK Infest waiting for a kill. Only go for certain kills or smokes." },
      { heading: "What NOT to Buy",
        text: "Midas — don't need it, hero farms fast enough and already has attack speed.\nPower Treads — useless, the hero needs movement speed.\nOrchid — fancy but there are always better alternatives." }
    ]
  },
  {
    hero: null, attr: "misc",
    title: "Short Guide on Warding",
    player: "Fieryfox", date: "Jan 6, 2026",
    sections: [
      { heading: "Step 1 — What Do You Hope to Achieve?",
        text: "For ganking: put aggressive wards in their jungle, spread out to cover most of the enemy side of the map.\n\nFor pushing: put wards near the tower you intend to push, and spare wards at the next tower.\n\nFor turtling (enemy has the lead): put very defensive wards — all on your side of the river, none in their jungle." },

  {

    title: "Captain Kunkka — Core Foundation Guide",

    sections: [
      { heading: "Abilities Overview",
        text: "Torrent — Scales to 300 damage at level 4. AOE stun with a delay. Damage and slow duration increase per level.\n\nTidebringer — Increases autoattack by ~65 at level 4, like a Battlefury for one hit with a big cleave AOE. Cooldown decreases per level.\n\nX Marks the Spot — Targeted hero returns to the marked spot after 4 seconds (or when activated manually). Cooldown decreases, cast range increases per level.\n\nGhostship — Sends a boat to stun and deal AOE damage. Grants allies the Rum buff, reducing all incoming damage by 50% for a short time (damage taken later in a delayed burst)." },
      { heading: "Recommended Items",
        text: "Start: Stout Shield, Quelling Blade, Tango, Ironwood Branch\nBoots: Phase Boots or Power Treads (if HP needed)\nEarly: Magic Wand, Bottle\nMid Game: Battle Fury, Sange and Yasha, Lothars Edge\nLate Game: Buriza, Assault Cuirass, BKB, Boots of Travel, Heart of Tarasque, Divine Rapier, Blink Dagger, Silver Edge" },

  {
    hero: "Meepo", attr: "agi",
    title: "How to Play Meepo — Beginner's Guide",
    player: "Shadow(x)", date: "Apr 2, 2026",
    sections: [
      { heading: "Item Build",
        text: "Power Treads (Early)\nDragon Lance / Drums (Great for stats)\nBlink Dagger\nSkadi / Ethereal Blade / Hex\nHeart / Ethereal Blade / Skadi\nHeart / Skadi" },
      { heading: "Skill Build",
        text: "Level 1: Poof\nLevel 2: (Skip — unless kill potential at lvl 3 or stopping a gank)\nLevel 3: Ultimate or Poof\nLevel 4: Earthbind\nLevel 5: Poof\nLevel 6: Geostrike\nLevel 7: Poof\nLevel 8: Earthbind\nLevel 9: Earthbind\nLevel 10: Ultimate\nLevel 11: Earthbind\n\nVs strong early/mid melee heroes (Naix, Ursa, Balanar, Slark): max Geostrike over Earthbind. But always prioritize Poof.\n\nSkipping level 2 works well vs ranged INT heroes you probably can't kill in the laning phase." },
      { heading: "Laning Phase",
        text: "The most crucial part for Meepo. He thrives on big gold leads by farming faster than most heroes with Poof.\n\nMeepo generally wants mid lane (solo XP) to get high levels and stack the jungle.\n\nDon't be shy using Poof to secure last hits. Your job is not to deny the enemy — it's to farm twice as fast. Double Poof your wave, secure CS, send both Meepos to stack the jungle, and repeat." },

  {
    hero: "Io", attr: "str",
    title: "Guardian Wisp — Complete Support Guide",
    player: "in_kam", date: "May 8, 2026",
    sections: [
      { heading: "Overview",
        text: "Io (Guardian Wisp) is an interesting hero, strong in the early and mid game. For players who don't understand his mechanics, he may feel overpowered — but in reality he can be countered quite easily if you know the nuances.\n\nAdvantages\n— Strong AoE damage through Spirits\n— High mobility thanks to Tether and Relocate\n\nDisadvantages\n— 0 base Armor (1 at level 1)\n— Weak Strength scaling (among STR heroes, only Alchemist is worse)" },
      { heading: "Core Items",
        text: "Healing Salve — one of the most important sustain items before Urn; always keep it in your inventory.\n\nSoul Ring + Tranquil Boots + Urn of Shadows — the three core items. Get them as early as possible. They unlock your full potential: insane HP/MP sustain, no need to return to fountain, and efficient hero babysitting.\n\nWhy not Arcane Boots or Bottle? Restoring resources through Overcharge is expensive (4.5% of current HP/MP per second). The correct pattern: wait until Spirits has ~7–8 seconds left on cooldown, cast Tether on ally, use Soul Ring, cast Spirits. This transfers mana to ally, and since you lost 150 HP from Soul Ring, you immediately recover it via Tranquil Boots or Urn without needing Overcharge.\n\nMagic Wand: Especially effective on Wisp. You restore HP/MP to yourself and to your Tether target, and Tether amplifies this by +50–60% to your ally.\n\nGlimmer Cape: Apply Urn to yourself, activate Overcharge, use Glimmer while moving toward your ally via Tether — you become invisible while restoring your ally's HP. Also hides you safely after Relocate returns you to the original position.\n\nBlade Mail: Solves your 0 armor issue. With properly timed Blade Mail and exploding Spirits you can heavily punish enemies — especially against AoE ultimates from Crystal Maiden, Earthshaker, Shadow Fiend, and Bloodseeker.\n\nNote: Healing Salve and Urn stack together. After getting Glimmer and Blade Mail, sell Magic Wand to free a slot for wards or Dust." },
      { heading: "Late Game Items",
        text: "Heart of Tarrasque: Greatly increases survivability. Together with Tether and Overcharge, restores huge amounts of HP to your ally. Keep distance so enemies cannot disable Heart regen. For experienced players: buying Heart early is completely broken — combined with +20% damage reduction from Overcharge and +50% bonus regen amplification from Tether, enemies usually cannot outburst the regen.\n\nSilver Edge: 40% outgoing damage reduction for 5 seconds, combined with Overcharge, reduces a carry's damage to almost nothing. Consider this if the enemy has one dominant carry.\n\nHeaven's Halberd: Effective before enemy cores get BKB. Provides evasion, temporarily disables an enemy core, and the Sange-based slow helps chase after Relocate.\n\nCollar Chest: Alternative to Blade Mail. Apply on your Tether ally, on Ursa or Legion Commander (30% miss probability), or when diving towers." },
      { heading: "Laning & Gameplay",
        text: "Laning with an Ally: Take aggressive HP trades — this lets you restore your ally's HP with Healing Salve/Faerie Fire/Tango at level 1 without Overcharge. Stack neutral camps using periodic Spirits damage. All lane creeps should go to your core. Control runes, buy Dust/Sentry as needed, place Observer Wards regularly.\n\nAfter getting Soul Ring, use Spirits on cooldown: hit enemy heroes, stack and pull camps, create a safe farming zone for your ally, and keep enemies away from your lane creeps.\n\nMid/Solo Lane: Having two non-mobile enemy heroes in your lane is one of the best scenarios. With a level advantage, use Spirits to zone enemies from allied creeps.\n\nBasic zoning sequence: Spin Spirits to maximum range / Step away from the creep wave / Wait for the enemy to go for a last hit / Cast Tether onto the nearest creep." },
      { heading: "Tether",
        text: "Learned at level 1. In the Reforged version there is no healing amplification transfer coefficient, so Tether is usually maxed last. Main scaling comes from the freeze effect duration (move/attack speed reduction).\n\nMax Tether when you need a longer-lasting slow, e.g. against heroes like Ursa.\n\nHP/MP transfer in practice: +50–60%.\n\nUseful to track cooldown timing — sometimes beneficial to break and recast Tether for a fresh slow. Track via Soul Ring: Tether has ~12s CD, slightly less than half a Soul Ring cycle." },
      { heading: "Spirits",
        text: "The main ability for efficient farming and lane pushing. Most damage comes from the explosion, so after Soul Ring the farming pattern is:\n\nAggro and stack 1–2 neutral camps using periodic Spirits damage, ideally at 53–54 seconds before the minute spawn / Tighten Spirits radius around your hero / Detonate / Cast new Spirits.\n\nSame for lane creep waves: Spin Spirits / Move between melee and ranged creeps / Wait ~2 seconds / Detonate.\n\nRelocate push: Activate Spirits first, wait 1–2 sec, then Relocate. Clear the current creep wave with periodic damage plus right clicks, move to the second wave, detonate Spirits at the last second.\n\nSolo gank without an ally on Tether: Activate Spirits / Wait 3–4 sec for Spirits to fully spawn / Relocate onto target / Freeze target with Tether onto a nearby creep / Detonate Spirits / Recast Spirits, finish with right clicks and Urn. Look for non-mobile solo targets with ~550 HP.\n\nDo not use Relocate without pre-activating Spirits." },
      { heading: "Overcharge",
        text: "Gives you and your Tether target 20% damage reduction (level 4) and attack speed, at the cost of 4.5% HP/MP drain per second.\n\nToggle Overcharge on and off when tanking tower hits or dodging spell casts to avoid unnecessary HP/MP loss." },
      { heading: "Relocate",
        text: "Levels 1–2: Predict enemy movement paths, usually cutting them off and teleporting slightly behind them.\nLevel 3: You can directly relocate onto the enemy hero's position.\n\nIf the enemy has Blink Dagger, ask your ally to get one too.\n\nSaving allies: Cast Relocate to fountain / Wait ~1–1.25 sec, then apply Tether (to avoid random stuns). Stay at medium distance — close enough for Tether range, not directly next to them. If enemies are at the return point, cancel Tether and return solo. You can also pull allies into better positions — cancel Tether if you want to leave them.\n\nRelocate can be cancelled by any micro-stun, or even non-obvious displacement abilities such as Queen of Pain's ultimate.\n\nDo not use Relocate on a Batrider ultimate target — you will teleport, but the target remains inside the Flaming Lasso." },
      { heading: "Advanced Mechanics",
        text: "Rosh Pit Bug: Do not activate Overcharge or adjust Spirits radius while moving toward a Tether target inside Roshan pit. Do not attack Roshan while approaching via Tether. Hidden collision objects at the top and right sides can get you stuck — with Overcharge active, you can lose HP/MP in seconds.\n\nRelocate Cancel via Tiny: Tiny can cancel your return to the original Relocate position by casting Toss at the last second. Cancel Tether first, otherwise you will stay behind while Tiny returns.\n\nCountering Silencer: Both attaching and detaching Tether can remove Curse of the Silent. If Curse of the Silent is applied use Tether; if Last Word follows, immediately break Tether — the damage and silence will not trigger.\n\nLatching onto Barathrum's Charge: Activate Spirits, wait until Barathrum gains speed and starts moving away, then apply Tether. Rapidly toggle Spirits radius (D and E keys) to control your distance.\n\nDelaying Movement toward Tether Target: Tether, then spam adjusting Spirits radius. This makes you jitter in position without fully closing the gap while Overcharge and healing continue working. Useful if you have an active Urn or Healing Salve.\n\nRevealing Wards and Invisible Units: Tighten Spirits to a specific radius and detonate for brief vision of high ground (~2 seconds). With Gem, use this to deward. Alternatively, spin Spirits at maximum radius — if one explodes, use Smoke to reveal nearby invisible heroes.\n\nMirana Invis Interaction: During Mirana ultimate or Smoke of Deceit, avoid using Spirits carelessly — they can reveal your position and your team on the map.\n\nDodging Kunkka and Disruptor: When you see the Glimpse visual, or ~1.5–2 seconds after Kunkka's cast, Tether to a distant creep or hero to pull yourself out of the impact zone. The same mechanic can pull Huskar into your fountain during his ultimate, and helps avoid AoE spells from Lina or Invoker. After an enemy Eul's Scepter is used on you, immediately Tether to reposition out of combo burst range." }
    ]
  },
  {
    hero: null, attr: "misc", icon: "image.png",
    title: "Rune Priority — A Team Resource Guide",
    player: "Lorry", date: null,
    sections: [
      { heading: "Why Runes Should Go to the Mid Player",
        text: "In Dota 1, runes may look like small resources in the river, but they can have a huge impact on the early game. Many new players take a rune immediately thinking 'why not?' — but randomly taking runes can hurt your mid player's rhythm, reduce ganking opportunities, and affect the outcome of the whole game.\n\nRunes are not for whoever sees them first. They should go to the player who can create the most value.\n\nThe mid player is often the early-game tempo controller, especially with a Bottle. A Bottle combined with runes helps them:\n— Refill Bottle charges and stay active in lane\n— Avoid losing the mid lane by staying off the fountain\n— Create pressure on side lanes with Invisibility, Haste, Double Damage, Illusion, or Regeneration\n\nIf you are playing a side-lane hero, especially without a Bottle or strong ganking ability, do not take a rune on sight. Ask yourself: Does our mid player have a Bottle? Are they moving toward the rune? Would this rune be more useful for them?" },
      { heading: "Which Heroes Should Have Priority",
        text: "Runes should go to heroes who can turn them into real advantages.\n\nMid heroes with Bottle: Shadow Fiend, Queen of Pain, Storm Spirit, Tinker, Pudge, Lina, Zeus. Runes help them sustain, control the lane, and rotate.\n\nHeroes with strong ganking ability: Pudge, Earthshaker, Sand King, Vengeful Spirit, Queen of Pain, Clockwerk, Night Stalker. With Invisibility, Haste, or Double Damage, they can often secure kills immediately.\n\nHeroes who need HP or mana to make a play: some heroes may be low but can still fight if they get a rune. Giving them the rune is far more valuable than a random teammate taking it." },
      { heading: "Rune-Specific Priority",
        text: "Invisibility Rune: Prioritize heroes with initiation or ganking potential — Pudge, Sand King, Earthshaker, Lina, Lion. Its greatest value is surprise attacks, flanking, and initiating fights — not safely walking back to lane.\n\nHaste Rune: Prioritize heroes who need to close the gap or start fights — Night Stalker, Pudge, Clockwerk, Sand King, Earthshaker. Haste can help them find kills much more easily.\n\nDouble Damage Rune: Prioritize mid cores, physical damage heroes, or heroes about to join a fight. In the early game, Double Damage can easily lead to a kill.\n\nRegeneration Rune: Prioritize heroes who are low on both HP and mana but can still fight afterward. Especially valuable for mid heroes with Bottle — they stay on the map instead of going back to base.\n\nIllusion Rune: Useful for controlling the lane, scouting, baiting spells, pushing waves, or checking dangerous areas. Do not take it without a purpose." },
      { heading: "Common Beginner Mistakes",
        text: "Many new players make these mistakes:\n\n— Taking a rune while already at full HP and mana\n— Taking a rune just before the mid player arrives with an empty Bottle\n— Taking an Invisibility rune but continuing to farm instead of ganking\n— Taking a Haste rune as support and doing nothing with it\n— Taking a key rune while teammates are preparing to gank\n\nThese actions may seem small, but they can cost your team a chance to refill Bottle, rotate, gank, or secure an important kill." },
      { heading: "Good Habits to Build",
        text: "When you see a rune, build these habits:\n\n— Check whether your mid player has a Bottle\n— Check whether a teammate is already moving toward the rune\n— Think about who can make the best use of it\n— Ping or tell teammates about the rune instead of taking it immediately\n— If you take the rune, use it right away and create value\n\nExample: You see an Invisibility rune at the bottom river and your mid Queen of Pain has a Bottle. The best choice is not to take it yourself. Tell her 'Invis bottom' — after taking it, she may rotate to a side lane and get your team a kill." },
      { heading: "Runes Are Team Resources",
        text: "Dota 1 is a team game. Even though runes spawn in public areas, they are still team resources. Rune priority should not be based on who clicks first, but on who can create the most value.\n\nRemember:\n— Do not take runes randomly\n— Mid players with Bottle should usually have priority\n— Heroes with ganking ability should have priority\n— Heroes who can immediately turn the rune into a kill or tempo advantage should have priority\n\nA well-used rune can lead to a kill, a tower, or a major momentum shift. A wasted rune can make your team miss an important opportunity.\n\nGiving up a rune when appropriate shows team awareness. Controlling runes shows tempo understanding. Not stealing runes randomly is an important step from beginner to better player." }
    ]
  },
  {
    hero: null, attr: "misc",
    icon: "https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/items/tome_of_knowledge.png",
    title: "Climbing the Ladder — T1 to T2 Tips",
    player: "Pavement", date: "Jun 19, 2026",
    sections: [
      { heading: "Overview",
        text: "Want to break free of your T1 chains but can't make flashy plays like FieryFox? Here are a couple of easy tips that anyone can use to climb from 900 ELO to 1100+ ELO and get into T2, without spamming boring heroes 24/7." },
      { heading: "Vision",
        text: "Warding is OP. People generally don't buy enough wards. This makes items like Lothar's and other invis abilities much stronger than they should be. Why is someone like Machaka crushing T1 lobbies? Because he's running around with an invis hero, killing your 700 ELO teammate over and over again. You know exactly what this guy is going to do, so just buy some wards and keep track of him. Warding enables ganks, prevents your team from dying, and gives you control over important farming areas and Roshan." },
      { heading: "Movement",
        text: "Don't run around aimlessly. You're either on your way somewhere to do something, or you're farming in an efficient pattern. If you're not getting anything done, don't be there." },
      { heading: "Objectives",
        text: "Getting towers and Roshan is OP. Every hit on a tower is a step closer to victory. Kills don't win games, objectives do. If the entire enemy team is dead, your main focus should be taking towers, barracks, or Roshan." },
      { heading: "Synergy",
        text: "Do you have a Tiny on your team? You know he's going to have mana problems, so why not buy Arcane Boots to keep him going? Boost your allies, especially your strongest allies, and they'll carry you to victory.\n\nSome heroes just dominate games. Treant, Dazzle, Omniknight, Abaddon, and several others can completely take over games and don't require crazy reflexes or flashy moves. If you have reliable teammates, consider picking these strong and easy heroes to win more games." },
      { heading: "Lobbies",
        text: "Shopping around for the right lobbies is boring. Still, some people are just not winnable with. Others, including some very high-ELO players, are incredibly negative and make games miserable despite their rank. Identify the main problematic players and dodge them." },
      { heading: "Items",
        text: "Get realistic items. You don't always need the perfect item build. Just identify your win condition and itemize around it. Does the enemy team have a level 25 Ursa? Get a Hex and disable him before he wrecks your entire team. Are you dying to right-clicks? Get a Ghost Scepter. Keep asking yourself why you are dying and what you can do to win the game.\n\nPeople generally don't buy items like Pipe, Guardian Greaves, Mekansm, and other utility items. These items are incredibly strong and can easily decide team fights." },
      { heading: "Ego",
        text: "Drop the ego. Stop using your healing spells only on yourself, stealing runes from your bottle-carrying mid, or obsessing over KDA. Who cares if you die if it wins the game? Body block the enemy to save your carry. Use your spells generously to enable and boost your teammates. Time your disables for maximum impact, not to secure the kill.\n\nStart winning games and get a taste of that elusive T2 apple." }
    ]
  }
];

function togglePatch(el) {
  const body = document.getElementById(el.dataset.id);
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  el.setAttribute('aria-expanded', open ? 'false' : 'true');
  el.innerHTML = `<span aria-hidden="true">📜</span> 6.89 Patch Changes ${open ? '▼' : '▲'}`;
}

  document.getElementById('guides-view').innerHTML = GUIDES.map((g, idx) => {
    const portraitUrl = g.hero ? getPortrait(g.hero) : (g.icon || WARD_URL);
    const portraitClass = g.hero ? '' : ' ward';
    const attrLabel = g.attr === 'misc' ? 'Support' : g.attr.toUpperCase();
    const isLong = g.sections.length > 2;

    const bodyClass = isLong && !expanded ? ' collapsed' : '';

      `<div class="guide-section">

        <div class="guide-section-text">${s.text}</div>
      </div>`

      : '';
    return `<div class="guide-card ${g.attr}" id="guide-card-${idx}">
      <div class="guide-header">
        <div class="guide-portrait${portraitClass}">
          <img src="${portraitUrl}" alt="${g.hero || 'Ward'}" onerror="this.style.opacity='.25'">
        </div>
        <div class="guide-info">
          <div class="guide-title">${g.title}</div>
          <div class="guide-meta">
            <span class="guide-author-badge">✦ ${g.player}</span>
            <span class="guide-attr-badge">${attrLabel}</span>
            ${g.date ? `<span class="guide-date">${g.date}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="guide-body${bodyClass}" id="guide-body-${idx}">${sectionsHTML}</div>
      ${expandBtn}
    </div>`;
  }).join('');
}

function toggleGuide(idx) {
  guideExpanded[idx] = !guideExpanded[idx];
  const body = document.getElementById(`guide-body-${idx}`);
  const btn  = document.querySelector(`#guide-card-${idx} .guide-expand-btn`);
  if (guideExpanded[idx]) {
    body.classList.remove('collapsed');
    btn.textContent = '▲ Collapse';
  } else {
    body.classList.add('collapsed');
    btn.textContent = '▼ Expand';
  }
}

function setGuides(btn) {
  guidesActive = true;
  document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
  btn.classList.add('active');
  btn.setAttribute('aria-pressed', 'true');
  document.getElementById('grid').style.display = 'none';
  document.getElementById('stats-bar').style.display = 'none';
  document.getElementById('guides-view').style.display = 'grid';
  renderGuides();
}

let SPELL_OVERRIDES = {};

function renderAbility(ability, heroName, isUlt) {
  const iconUrl = getSpellIcon(heroName, ability.name);
  let stats = ability.stats || [];
  let abDesc = ability.desc;
  const heroOvr = SPELL_OVERRIDES[heroName];
  if (heroOvr && heroOvr[ability.name]) {
    const ovr = heroOvr[ability.name];
    if (ovr.desc) abDesc = ovr.desc;
    stats = stats.map(p => {
      for (const [lbl, val] of Object.entries(ovr)) {
        if (lbl === 'desc') continue;
        const elbl = lbl.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        p = p.replace(new RegExp(`(<b>${elbl}<\\/b> )([^<]+)`), `$1${val}`);
      }
      return p;
    });
  }
  const statsHTML = stats.length ? `<div class="spell-stats">${stats.join('')}</div>` : '';
  const aghanim = AGHANIM_UPGRADES[heroName];
  const aghanimHTML = (aghanim && aghanim.ability === ability.name)
    ? `<div class="aghanim-upgrade"><img class="agh-icon" src="https://cdn.w3dota.com/items/BTNINV_Wand_05.gif" alt="Aghanim's Scepter"><div class="agh-text"><div class="agh-label">Aghanim's Scepter</div><div class="agh-desc">${aghanim.desc}</div></div></div>`
    : '';

  return `<div class="ability${isUlt ? ' ult' : ''}">
    <div class="ability-top">
      <div class="ability-icon">
        ${iconUrl ? `<img src="${iconUrl}" alt="${ability.name}" onerror="this.parentElement.innerHTML='<div class=\\'no-icon\\'>✨</div>'">` : '<div class="no-icon">✨</div>'}
      </div>
      <div class="ability-content">
        <div class="ability-name">${isUlt ? '★ ' : ''}${ability.name}</div>
        <div class="ability-desc">${abDesc}</div>
        ${statsHTML}
        ${aghanimHTML}
      </div>
    </div>
  </div>`;
}

function renderHero(h) {
  const imgUrl = getPortrait(h.name);
  const portraitHTML = imgUrl
    ? `<img src="${imgUrl}" alt="${h.name}" width="72" height="62" onerror="this.classList.add('err')"><div class="fallback-icon" aria-hidden="true">${h.attr==='str'?'⚔':h.attr==='agi'?'🏹':'🔮'}</div>`
    : `<div class="fallback-icon" style="opacity:1">${h.attr==='str'?'⚔':h.attr==='agi'?'🏹':'🔮'}</div>`;

  const heroRoles = HERO_ROLES[h.name] || [];
  const rolePillsHTML = heroRoles.length ? `<div class="role-pills">${heroRoles.map(r=>`<span class="role-pill ${r}">${ROLE_LABELS[r]||r}</span>`).join('')}</div>` : '';

  const abilitiesHTML = h.abilities.map(a => renderAbility(a, h.name, a.ult)).join('');

  // Base stats section
  let baseStatsHTML = '';
  if (typeof HERO_STATS !== 'undefined' && HERO_STATS[h.name]) {
    const s = HERO_STATS[h.name];
    const parseAttr = v => { const [b, g] = (v||'').split('+'); return {b: b||'—', g: g ? `+${g}` : ''}; };
    const str = parseAttr(s.str), agi = parseAttr(s.agi), int = parseAttr(s.int);
    const attrRow = `<div class="bs-attr-row">
      <span class="bs-attr str" title="Strength"><span class="bs-attr-label">STR</span><span class="bs-attr-val">${str.b}</span><span class="bs-attr-gain">${str.g}/lvl</span></span>
      <span class="bs-attr agi" title="Agility"><span class="bs-attr-label">AGI</span><span class="bs-attr-val">${agi.b}</span><span class="bs-attr-gain">${agi.g}/lvl</span></span>
      <span class="bs-attr int" title="Intelligence"><span class="bs-attr-label">INT</span><span class="bs-attr-val">${int.b}</span><span class="bs-attr-gain">${int.g}/lvl</span></span>
    </div>`;
    const cs = [
      s.dmg   ? `<span class="bs-stat"><span class="bs-stat-lbl">DMG</span><span class="bs-stat-val">${s.dmg}</span></span>` : '',
      s.armor ? `<span class="bs-stat"><span class="bs-stat-lbl">Armor</span><span class="bs-stat-val">${s.armor}</span></span>` : '',
      s.range ? `<span class="bs-stat"><span class="bs-stat-lbl">Range</span><span class="bs-stat-val">${s.range}</span></span>` : '',
      s.ms    ? `<span class="bs-stat"><span class="bs-stat-lbl">MS</span><span class="bs-stat-val">${s.ms}</span></span>` : '',
      s.as    ? `<span class="bs-stat" title="Base Attack Time — lower is faster"><span class="bs-stat-lbl">BAT</span><span class="bs-stat-val">${s.as}</span></span>` : '',
      s.hp    ? `<span class="bs-stat"><span class="bs-stat-lbl">HP</span><span class="bs-stat-val">${s.hp}${s.hpPerLvl ? ` <small>+${s.hpPerLvl}/lvl</small>` : ''}</span></span>` : '',
      s.mp    ? `<span class="bs-stat"><span class="bs-stat-lbl">Mana</span><span class="bs-stat-val">${s.mp}${s.mpPerLvl ? ` <small>+${s.mpPerLvl}/lvl</small>` : ''}</span></span>` : '',
    ].filter(Boolean).join('');
    baseStatsHTML = `<div class="base-stats"><div class="section-label"><span aria-hidden="true">◈</span> Base Stats</div>${attrRow}<div class="bs-combat-row">${cs}</div></div>`;
  }

  const topItems = (typeof HERO_ITEMS !== 'undefined' && HERO_ITEMS[h.name]) ? HERO_ITEMS[h.name].slice(0,10) : [];
  const topItemsHTML = topItems.length
    ? `<div class="top-items"><div class="top-items-label">🛒 TOP COMMUNITY ITEMS</div><div class="top-items-icons">${topItems.map(it=>`<img src="${it.icon}" alt="${it.name}" title="${it.name} (${it.count}x)" loading="lazy">`).join('')}</div></div>`
    : '';

  const patchSafeId = h.name.replace(/[^a-z0-9]/gi,'-').toLowerCase();
  const patchesHTML = h.patches && h.patches.length
    ? `<div class="patch-changes"><button type="button" class="patch-changes-label" onclick="togglePatch(this)" data-id="patch-${patchSafeId}" aria-expanded="false"><span aria-hidden="true">📜</span> 6.89 Patch Changes ▼</button><div id="patch-${patchSafeId}" style="display:none">${h.patches.map(p => `<div class="patch-change-item">${p}</div>`).join('')}</div></div>`
    : '';

  // Skill order strip
  let skillOrderHTML = '';
  if (typeof SKILL_BUILDS !== 'undefined' && SKILL_BUILDS[h.name]) {
    const entry = SKILL_BUILDS[h.name];
    // Support both formats: plain array (single build) or [{label,build},...] (multi-build)
    const builds = (entry.length > 0 && typeof entry[0] === 'object')
      ? entry
      : [{ label: null, build: entry }];
    const renderStrip = (order, label) => {
      const cells = order.map((abilityIdx, i) => {
        const lvl = i + 1;
        if (abilityIdx === -1) {
          return `<div class="so-cell"><div class="so-icon-wrap is-stats">+</div><div class="so-lvl">${lvl}</div></div>`;
        }
        const ability  = h.abilities[abilityIdx];
        const isUlt    = abilityIdx === 3;
        const iconUrl  = ability ? getSpellIcon(h.name, ability.name) : null;
        const iconHTML = iconUrl
          ? `<img src="${iconUrl}" alt="${ability.name}" loading="lazy" onerror="this.style.opacity='.3'">`
          : `<span style="font-size:.6rem;color:#5a5a70">${['Q','W','E','R'][abilityIdx]}</span>`;
        return `<div class="so-cell"><div class="so-icon-wrap${isUlt?' is-ult':''}" title="${ability ? ability.name : ''} (lvl ${lvl})">${iconHTML}</div><div class="so-lvl">${lvl}</div></div>`;
      }).join('');
      const labelText = label ? `★ SKILL ORDER — ${label}` : `★ SUGGESTED SKILL ORDER`;
      return `<div class="skill-order"><div class="skill-order-label">${labelText}</div><div class="skill-order-strip">${cells}</div></div>`;
    };
    skillOrderHTML = builds.map(b => renderStrip(b.build, b.label)).join('');
  }

  // Matchups section
  let matchupsHTML = '';
  if (typeof HERO_MATCHUPS !== 'undefined' && HERO_MATCHUPS[h.name]) {
    const mu = HERO_MATCHUPS[h.name];
    const makeRow = (label, cls, list) => {
      const items = list.map(n => {
        const p = getPortrait(n);
        const img = p ? `<img src="${p}" alt="${n}" title="${n}" loading="lazy" onerror="this.style.display='none'">` : '';
        return `<div class="mu-hero">${img}<span>${n}</span></div>`;
      }).join('');
      return `<div class="mu-row"><span class="mu-label ${cls}">${label}</span><div class="mu-heroes">${items}</div></div>`;
    };
    matchupsHTML = `<div class="matchup-section">
      <div class="matchup-header">⚔ Matchups</div>
      <div class="matchup-body">
        ${makeRow('Countered By','mu-bad',mu.countered_by)}
        ${makeRow('Good Against','mu-good',mu.counters)}
        ${makeRow('Good With','mu-synergy',mu.good_with)}
      </div>
    </div>`;
  }

  return `<div class="hero-card ${h.attr} ${h.faction}">
    <div class="hero-header">
      <div class="hero-portrait">${portraitHTML}</div>
      <div class="hero-title-area">
        <h2>${h.name}</h2>
        <div class="tagline">${h.title}</div>
        ${rolePillsHTML}
      </div>
      <div class="hero-badges">
        <span class="attr-badge">${h.attr.toUpperCase()}</span>
        <span class="faction-badge">${h.faction === 'sentinel' ? 'Sentinel' : 'Scourge'}</span>
        ${HERO_DIFFICULTY[h.name] ? `<span class="diff-badge ${HERO_DIFFICULTY[h.name]}">${HERO_DIFFICULTY[h.name].charAt(0).toUpperCase()+HERO_DIFFICULTY[h.name].slice(1)}</span>` : ''}
      </div>
    </div>
    <div class="hero-body">
      <div class="hero-desc">${h.desc}</div>
      ${baseStatsHTML}
      <div class="section-label"><span aria-hidden="true">⚡</span> Abilities</div>
      <div class="abilities">${abilitiesHTML}</div>
      ${h.name === 'Invoker' ? `<button class="btn-invoke-spells" onclick="openInvokeModal()">⚗ View All 10 Invoked Spells</button>` : ''}
      ${skillOrderHTML}
      ${topItemsHTML}
      ${matchupsHTML}
      ${patchesHTML}
    </div>
  </div>`;
}

function initGrid() {
  const sorted = [...heroes].sort((a, b) => a.name.localeCompare(b.name));
  document.getElementById('grid').innerHTML = sorted.map(h => {
    const searchStr = [h.name, h.title, h.desc,
      ...h.abilities.map(a => a.name + ' ' + a.desc),
      ...(h.patches || [])
    ].join(' ').toLowerCase().replace(/"/g, '&quot;');
    const roles = (HERO_ROLES[h.name] || []).join(',');
    return renderHero(h).replace(
      'class="hero-card',
      `data-attr="${h.attr}" data-faction="${h.faction}" data-roles="${roles}" data-search="${searchStr}" class="hero-card`
    );
  }).join('');
}

function render() {
  const cards = document.querySelectorAll('#grid .hero-card');
  let count = 0;
  cards.forEach(card => {
    let show = true;
    if (activeFilter === 'str' || activeFilter === 'agi' || activeFilter === 'int') {
      if (card.dataset.attr !== activeFilter) show = false;
    } else if (activeFilter === 'sentinel' || activeFilter === 'scourge') {
      if (card.dataset.faction !== activeFilter) show = false;
    }
    if (show && activeRole !== 'all') {
      if (!(card.dataset.roles || '').split(',').includes(activeRole)) show = false;
    }
    if (show && searchQuery) {
      const _sd = card.dataset.search || '';
      const _norm = (s) => s.replace(/[\s\-]/g, '');
      if (!_sd.includes(searchQuery) && !_norm(_sd).includes(_norm(searchQuery))) show = false;
    }
    card.style.display = show ? '' : 'none';
    if (show) count++;
  });
  document.getElementById('cnt').textContent = count;
  document.getElementById('no-results').style.display = count === 0 ? '' : 'none';
}

function setFilter(type, btn) {
  guidesActive = false;
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
  btn.classList.add('active');
  btn.setAttribute('aria-pressed', 'true');
  document.getElementById('grid').style.display = '';
  document.getElementById('stats-bar').style.display = '';
  document.getElementById('guides-view').style.display = 'none';
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

let _searchTimer;
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  if (guidesActive) {
    guidesActive = false;
    document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
    const allBtn = document.querySelector('.filter-btn.all');
    allBtn.classList.add('active');
    allBtn.setAttribute('aria-pressed', 'true');
    activeFilter = 'all';
    document.getElementById('grid').style.display = '';
    document.getElementById('stats-bar').style.display = '';
    document.getElementById('guides-view').style.display = 'none';
  }
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(render, 120);
});

fetch('/spell_overrides.json?t='+Date.now()).then(r=>r.json()).then(o=>{SPELL_OVERRIDES=o;initGrid();render();}).catch(()=>{});
initGrid();

// ── Dust particles ────────────────────────────────────────────────────────
(function(){
  const canvas = document.getElementById('dust-canvas');
  const ctx = canvas.getContext('2d');
  const COUNT = 60;
  const particles = [];

  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  for(let i = 0; i < COUNT; i++){
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.2 + 0.4,
      vx: (Math.random() - 0.5) * 0.25,
      vy: -(Math.random() * 0.35 + 0.08),
      op: Math.random() * 0.35 + 0.08
    });
  }

  function tick(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for(const p of particles){
      p.x += p.vx; p.y += p.vy;
      if(p.y < -4){ p.y = canvas.height + 4; p.x = Math.random() * canvas.width; }
      if(p.x < -4) p.x = canvas.width + 4;
      if(p.x > canvas.width + 4) p.x = -4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, 6.283);
      ctx.fillStyle = `rgba(201,168,76,${p.op})`;
      ctx.fill();
    }
    requestAnimationFrame(tick);
  }
  tick();
})();

function openInvokeModal() {
  const grid = document.getElementById('invoke-spells-grid');
  if (!grid.children.length) {
    const ORB = { Q:'Quas', W:'Wex', E:'Exort' };
    grid.innerHTML = INVOKE_SPELLS.map(s => {
      const orbHTML = s.combo.map(o => `<span class="orb-${o.toLowerCase()}">${ORB[o]}</span>`).join('');
      return `<div class="invoke-spell-card">
        <img class="invoke-spell-icon" src="${s.icon}" alt="${s.name}" onerror="this.style.opacity='.25'">
        <div class="invoke-spell-info">
          <div class="invoke-spell-name">${s.name}</div>
          <div class="invoke-spell-combo">${orbHTML}</div>
          <div class="invoke-spell-desc">${s.desc}</div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('invoke-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeInvokeModal() {
  document.getElementById('invoke-modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeInvokeModal(); });
